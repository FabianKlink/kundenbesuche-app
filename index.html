<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PICO Field App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <style>
    body { font-family: Inter, sans-serif; }
    .wuerth-red { color: #d4001a; }
    .bg-wuerth-red { background-color: #d4001a; }
    .bg-wuerth-red-dark { background-color: #b10016; }
    .border-wuerth-red { border-color: #d4001a; }
    .ring-wuerth-red { --tw-ring-color: rgba(212, 0, 26, 0.28); }
  </style>
</head>
<body class="bg-zinc-200 text-slate-900">
  <script>
    window.SUPABASE_URL = 'https://havbnbjvomsfgdvcluhw.supabase.co';
    window.SUPABASE_ANON_KEY = 'sb_publishable_zKW9ZOlNSmheSkJL0riodQ_H9OQPYE6';
  </script>

  <div class="mx-auto min-h-screen max-w-md bg-zinc-50 shadow-2xl">
    <header class="sticky top-0 z-10 border-b border-zinc-200 bg-white/95 px-4 py-4 backdrop-blur">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-xs font-semibold uppercase tracking-[0.2em] text-red-700">WÜRTH Kundenbesuche</div>
          <h1 class="text-lg font-bold">Anwendungstechnik</h1>
        </div>
        <div class="flex items-center gap-2">
          <button id="settingsHeaderBtn" class="rounded-full bg-zinc-200 px-3 py-2 text-xs font-medium text-zinc-700">Einstellungen</button>
          <button id="logoutBtn" class="hidden rounded-full bg-red-700 px-3 py-2 text-xs font-medium text-white">Abmelden</button>
          <div id="appStatusBadge" class="rounded-full bg-amber-100 px-3 py-1 text-xs font-medium text-amber-700">Wird verbunden</div>
        </div>
      </div>
    </header>

    <main id="app" class="px-4 py-4 pb-24"></main>

    <div id="loginOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 p-6">
      <div class="w-full max-w-sm rounded-3xl bg-white p-6 shadow-2xl">
        <div class="text-xs font-semibold uppercase tracking-[0.2em] text-red-700">Wuerth Kundenbesuche</div>
        <h2 class="mt-2 text-2xl font-bold text-slate-900">Anmelden</h2>
        <p class="mt-2 text-sm text-slate-500">Bitte mit deiner E-Mail und deinem Passwort anmelden, um auf die Kundenbesuche zuzugreifen.</p>
        <form id="loginForm" class="mt-6 space-y-4">
          <label class="block space-y-1">
            <span class="text-sm font-medium text-slate-700">E-Mail</span>
            <input id="loginEmail" type="email" class="w-full rounded-xl border border-slate-300 px-3 py-3 text-sm outline-none" placeholder="name@firma.de" required />
          </label>
          <label class="block space-y-1">
            <span class="text-sm font-medium text-slate-700">Passwort</span>
            <input id="loginPassword" type="password" class="w-full rounded-xl border border-slate-300 px-3 py-3 text-sm outline-none" placeholder="Passwort" required />
          </label>
          <div id="loginMessage" class="hidden rounded-xl bg-red-50 px-3 py-3 text-sm text-red-700"></div>
          <button type="submit" class="w-full rounded-2xl bg-red-700 px-4 py-4 font-semibold text-white shadow-lg">Anmelden</button>
        </form>
      </div>
    </div>

    <nav class="fixed bottom-0 left-1/2 z-20 flex w-full max-w-md -translate-x-1/2 border-t border-zinc-200 bg-white">
      <button data-screen="start" class="nav-btn flex-1 px-2 py-3 text-center text-xs text-blue-600">
        <div class="text-lg">🏠</div>
        <div>Start</div>
      </button>
      <button data-screen="besuche" class="nav-btn flex-1 px-2 py-3 text-center text-xs text-slate-500">
        <div class="text-lg">📋</div>
        <div>Besuche</div>
      </button>
      <button data-screen="neu" class="nav-btn flex-1 px-2 py-3 text-center text-xs text-slate-500">
        <div class="text-lg">➕</div>
        <div>Neu</div>
      </button>
      <button data-screen="dashboard" class="nav-btn flex-1 px-2 py-3 text-center text-xs text-slate-500">
        <div class="text-lg">📊</div>
        <div>Dashboard</div>
      </button>
      <button data-screen="einstellungen" class="nav-btn flex-1 px-2 py-3 text-center text-xs text-slate-500">
        <div class="text-lg">⚙️</div>
        <div>Mehr</div>
      </button>
    </nav>
  </div>

  <script>
    const supabaseEnabled = window.SUPABASE_URL && window.SUPABASE_ANON_KEY;
    const supabaseClient = supabaseEnabled ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY) : null;

    const defaultMasterData = {
      techniker: ["Fabian Klink", "Jose Batista"],
      aufnahme: ["HSK63F", "SK30", "SK30 ohne Mitnehmernut"],
      verfahren: ["Auralix", "Mono-Zerspanung", "ISO-Drehen"],
      besuchsarten: ["Erstbesuch", "Nachverfolgung", "Testlauf", "Reklamation", "Beratung vor Ort", "Beratung Teams", "Optimierung", "Angebotsbesprechung", "Maschinenaufnahme", "Schulung"],
      werkstoffe: ["Stahl", "Edelstahl", "Guss", "Aluminium", "Aluminiumprofil", "Titan", "Superlegierung", "Kunststoff", "Kunstoffprofil", "Kupfer/Messing", "Sonstiges"],
      bearbeitungsziele: ["Prozessoptimierung", "Werkzeugauswahl", "Standzeit", "Oberflächengüte", "Taktzeit", "Prozesssicherheit", "Neuanwendung", "Kostenreduktion"],
      ergebnisse: ["Erfolgreich", "In Prüfung", "Ohne Ergebnis", "Folgeversuch notwendig", "Angebot erforderlich"],
      status: ["Offen", "In Bearbeitung", "Abgeschlossen"],
      prioritaeten: ["Niedrig", "Mittel", "Hoch"],
      massnahmen: ["Muster senden", "Angebot erstellen", "Rueckruf", "Folgetermin", "Werkzeugtest", "Interne Klaerung", "Dokumentation senden", "Keine"]
    };

    const stammgruppen = [
      ["techniker", "Techniker"],
      ["aufnahme", "Aufnahmen"],
      ["verfahren", "Verfahren"],
      ["besuchsarten", "Besuchsarten"],
      ["werkstoffe", "Werkstoffe"],
      ["bearbeitungsziele", "Bearbeitungsziele"],
      ["ergebnisse", "Ergebnisse"],
      ["status", "Status"],
      ["prioritaeten", "Prioritäten"],
      ["massnahmen", "Maßnahmen"]
    ];

    const emptyVisit = () => ({
      id: null,
      besuchsdatum: new Date().toISOString().slice(0, 10),
      techniker: "",
      kundennummer: "",
      kundenname: "",
      ansprechperson: "",
      adm: "",
      angebotsnummer: "",
      besuchsart: "",
      maschine: "",
      maschinenhersteller: "",
      aufnahme: "",
      verfahren: [],
      werkstoff: [],
      materialbezeichnung: "",
      bearbeitungsziel: "",
      problemstellung: "",
      empfehlung: "",
      besuchsbericht: "",
      ergebnis: "",
      naechsteMassnahme: "",
      verantwortlich: "",
      status: "Offen",
      prioritaet: "Mittel",
      bildVorhanden: false,
      bilder: [],
      createdBy: null,
      updatedBy: null,
      createdAt: null,
      updatedAt: null
    });

    const state = {
      screen: "start",
      search: "",
      filterStatus: "Alle",
      selectedVisit: null,
      fullImageVisit: null,
      editingVisitId: null,
      form: emptyVisit(),
      formErrors: {},
      settingsDraft: {},
      visits: [],
      visitFiles: {},
      pendingFiles: [],
      currentUser: null,
      sessionReady: false,
      loading: false,
      busy: false,
      masterData: structuredClone(defaultMasterData)
    };

    function resetSettingsDraft() {
      const draft = {};
      stammgruppen.forEach(([key]) => {
        draft[key] = "";
      });
      state.settingsDraft = draft;
    }
    resetSettingsDraft();

    const app = document.getElementById('app');
    const loginOverlay = document.getElementById('loginOverlay');
    const loginForm = document.getElementById('loginForm');
    const loginMessage = document.getElementById('loginMessage');
    const logoutBtn = document.getElementById('logoutBtn');
    const appStatusBadge = document.getElementById('appStatusBadge');

    function setStatus(text, tone = 'amber') {
      const tones = {
        amber: 'rounded-full bg-amber-100 px-3 py-1 text-xs font-medium text-amber-700',
        green: 'rounded-full bg-emerald-100 px-3 py-1 text-xs font-medium text-emerald-700',
        red: 'rounded-full bg-red-100 px-3 py-1 text-xs font-medium text-red-700'
      };
      appStatusBadge.className = tones[tone] || tones.amber;
      appStatusBadge.textContent = text;
    }

    function showLoginMessage(message) {
      loginMessage.textContent = message;
      loginMessage.classList.remove('hidden');
    }

    function hideLoginMessage() {
      loginMessage.classList.add('hidden');
      loginMessage.textContent = '';
    }

    function updateLoginState() {
      const loggedIn = !!state.currentUser;
      loginOverlay.style.display = loggedIn ? 'none' : 'flex';
      logoutBtn.classList.toggle('hidden', !loggedIn);
      setStatus(loggedIn ? 'Verbunden' : 'Anmeldung nötig', loggedIn ? 'green' : 'amber');
    }

    function rules(visit) {
      const isReklamation = visit.besuchsart === 'Reklamation';
      const isSchulung = visit.besuchsart === 'Schulung';
      const isFabian = visit.techniker === 'Fabian Klink';
      return {
        problemPflicht: isReklamation,
        bilderPflicht: isReklamation,
        berichtPflicht: isFabian,
        maschineOptional: isSchulung,
        aufnahmePflicht: isFabian,
        werkstoffPflicht: isFabian || isReklamation
      };
    }

    function stats() {
      const total = state.visits.length;
      const offen = state.visits.filter(v => v.status === 'Offen').length;
      const bearbeitung = state.visits.filter(v => v.status === 'In Bearbeitung').length;
      const abgeschlossen = state.visits.filter(v => v.status === 'Abgeschlossen').length;
      const technikerNames = [...new Set([
        ...(state.masterData.techniker || []),
        ...state.visits.map(v => v.techniker).filter(Boolean)
      ])];
      const techniker = technikerNames.map(name => ({
        name,
        count: state.visits.filter(v => v.techniker === name).length
      })).sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));

      const besuchsartenMap = {};
      state.visits.forEach(v => {
        const key = v.besuchsart || 'Ohne Besuchsart';
        besuchsartenMap[key] = (besuchsartenMap[key] || 0) + 1;
      });
      const besuchsarten = Object.entries(besuchsartenMap)
        .map(([name, count]) => ({ name, count }))
        .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));

      return {
        total,
        offen,
        bearbeitung,
        abgeschlossen,
        technikerAktiv: techniker.filter(t => t.count > 0).length,
        techniker,
        besuchsarten
      };
    }

    function setScreen(screen) {
      state.screen = screen;
      render();
    }

    function updateNav() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        const active = btn.dataset.screen === state.screen;
        btn.classList.toggle('text-blue-600', active);
        btn.classList.toggle('text-slate-500', !active);
      });
    }

    function normalizeArrayValue(value) {
      if (Array.isArray(value)) return value.filter(Boolean);
      if (typeof value === 'string') return value.split(',').map(item => item.trim()).filter(Boolean);
      return [];
    }

    function summarize(value) {
      if (Array.isArray(value)) return value.join(', ');
      return value || '—';
    }

    async function ensureAuthenticated() {
      if (!supabaseEnabled) {
        setStatus('Supabase fehlt', 'red');
        return false;
      }
      return !!state.currentUser;
    }

    async function loadMasterData() {
      state.masterData = structuredClone(defaultMasterData);
    }

    async function loadVisits() {
      if (!supabaseEnabled || !state.currentUser) {
        state.visits = [];
        state.visitFiles = {};
        return;
      }

      state.loading = true;
      render();
      const { data, error } = await supabaseClient
        .from('visits')
        .select('*')
        .order('besuchsdatum', { ascending: false })
        .order('created_at', { ascending: false });

      if (error) {
        state.loading = false;
        throw error;
      }

      state.visits = (data || []).map(row => ({
        id: row.id,
        besuchsdatum: row.besuchsdatum || '',
        techniker: row.techniker || '',
        kundennummer: row.kundennummer || '',
        kundenname: row.kundenname || '',
        ansprechperson: row.ansprechperson || '',
        adm: row.adm || '',
        angebotsnummer: row.angebotsnummer || '',
        besuchsart: row.besuchsart || '',
        maschine: row.maschine || '',
        maschinenhersteller: row.maschinenhersteller || '',
        aufnahme: row.aufnahme || '',
        verfahren: normalizeArrayValue(row.verfahren),
        werkstoff: normalizeArrayValue(row.werkstoff),
        materialbezeichnung: row.materialbezeichnung || '',
        bearbeitungsziel: row.bearbeitungsziel || '',
        problemstellung: row.problemstellung || '',
        empfehlung: row.empfehlung || '',
        besuchsbericht: row.besuchsbericht || '',
        ergebnis: row.ergebnis || '',
        naechsteMassnahme: row.naechste_massnahme || '',
        verantwortlich: row.verantwortlich || '',
        status: row.status || 'Offen',
        prioritaet: row.prioritaet || 'Mittel',
        bilder: [],
        bildVorhanden: false,
        createdAt: row.created_at || null,
        updatedAt: row.updated_at || null,
        createdBy: row.created_by || null,
        updatedBy: row.updated_by || null
      }));

      const ids = state.visits.map(v => v.id).filter(Boolean);
      state.visitFiles = {};
      if (ids.length) {
        const { data: filesData, error: filesError } = await supabaseClient
          .from('visit_files')
          .select('*')
          .in('visit_id', ids)
          .order('created_at', { ascending: false });
        if (filesError) {
          state.loading = false;
          throw filesError;
        }
        (filesData || []).forEach(file => {
          if (!state.visitFiles[file.visit_id]) state.visitFiles[file.visit_id] = [];
          state.visitFiles[file.visit_id].push(file);
        });
      }

      state.visits.forEach(visit => {
        visit.dateien = state.visitFiles[visit.id] || [];
        visit.bildVorhanden = visit.dateien.some(file => file.file_category === 'image');
      });

      state.loading = false;
    }

    async function saveVisit() {
      if (!(await ensureAuthenticated())) return;

      state.busy = true;
      render();
      const visit = { ...state.form };
      const payload = {
        besuchsdatum: visit.besuchsdatum || null,
        techniker: visit.techniker || null,
        kundennummer: visit.kundennummer || null,
        kundenname: visit.kundenname || null,
        ansprechperson: visit.ansprechperson || null,
        adm: visit.adm || null,
        angebotsnummer: visit.angebotsnummer || null,
        besuchsart: visit.besuchsart || null,
        maschine: visit.maschine || null,
        maschinenhersteller: visit.maschinenhersteller || null,
        aufnahme: visit.aufnahme || null,
        verfahren: visit.verfahren,
        werkstoff: visit.werkstoff,
        materialbezeichnung: visit.materialbezeichnung || null,
        bearbeitungsziel: visit.bearbeitungsziel || null,
        problemstellung: visit.problemstellung || null,
        empfehlung: visit.empfehlung || null,
        besuchsbericht: visit.besuchsbericht || null,
        ergebnis: visit.ergebnis || null,
        naechste_massnahme: visit.naechsteMassnahme || null,
        verantwortlich: visit.verantwortlich || null,
        status: visit.status || 'Offen',
        prioritaet: visit.prioritaet || 'Mittel',
        updated_by: state.currentUser.id
      };

      let savedId = visit.id;
      let error;
      if (savedId) {
        ({ error } = await supabaseClient.from('visits').update(payload).eq('id', savedId));
      } else {
        payload.created_by = state.currentUser.id;
        const result = await supabaseClient.from('visits').insert(payload).select('id').single();
        error = result.error;
        savedId = result.data?.id;
      }

      if (error) {
        state.busy = false;
        render();
        alert('Speichern fehlgeschlagen: ' + error.message);
        return;
      }

      state.form = emptyVisit();
      state.editingVisitId = null;
      state.pendingFiles = [];
      await loadVisits();
      state.busy = false;
      state.screen = 'besuche';
      render();
    }

    function startNewVisit(type = 'werkzeugversuch') {
      state.editingVisitId = null;
      state.pendingFiles = [];
      state.form = emptyVisit();
      state.screen = 'neu';
      render();
    }

    function startEditVisit(id) {
      const visit = state.visits.find(v => v.id === id);
      if (!visit) return;
      state.editingVisitId = id;
      state.form = JSON.parse(JSON.stringify(visit));
      state.pendingFiles = [];
      state.screen = 'neu';
      render();
    }

    function renderStart() {
      const s = stats();
      return `
        <section class="space-y-4">
          <div class="rounded-3xl bg-gradient-to-br from-red-700 via-red-600 to-red-800 p-5 text-white shadow-xl">
            <div class="text-xs uppercase tracking-[0.2em] text-red-100">Willkommen</div>
            <h2 class="mt-2 text-2xl font-bold">Kundenbesuche im Blick</h2>
            <p class="mt-2 text-sm text-red-50">Erfasse Kundenbesuche direkt mobil und behalte offene Aktivitäten im Auge.</p>
            <div class="mt-4 grid grid-cols-2 gap-3 text-sm">
              <div class="rounded-2xl bg-white/10 p-3">
                <div class="text-red-100">Gesamt</div>
                <div class="text-2xl font-bold">${s.total}</div>
              </div>
              <div class="rounded-2xl bg-white/10 p-3">
                <div class="text-red-100">Offen</div>
                <div class="text-2xl font-bold">${s.offen}</div>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <button onclick="startNewVisit()" class="rounded-2xl bg-white p-4 text-left shadow-sm ring-1 ring-zinc-200">
              <div class="text-2xl">➕</div>
              <div class="mt-2 font-semibold">Neuer Besuch</div>
              <div class="text-xs text-slate-500">Bericht erfassen</div>
            </button>
            <button onclick="setScreen('besuche')" class="rounded-2xl bg-white p-4 text-left shadow-sm ring-1 ring-zinc-200">
              <div class="text-2xl">📋</div>
              <div class="mt-2 font-semibold">Besuche</div>
              <div class="text-xs text-slate-500">Liste anzeigen</div>
            </button>
          </div>
        </section>
      `;
    }

    function renderBesuche() {
      const filtered = state.visits.filter(v => {
        const q = state.search.trim().toLowerCase();
        if (!q) return state.filterStatus === 'Alle' || v.status === state.filterStatus;
        const hay = [v.kundenname, v.kundennummer, v.ansprechperson, v.techniker, v.besuchsart].join(' ').toLowerCase();
        const statusOk = state.filterStatus === 'Alle' || v.status === state.filterStatus;
        return statusOk && hay.includes(q);
      });

      return `
        <section class="space-y-4">
          <div class="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-zinc-200">
            <input type="search" value="${state.search}" oninput="state.search=this.value; render()" placeholder="Suchen" class="w-full rounded-2xl border border-zinc-200 px-4 py-3 text-sm outline-none" />
            <div class="mt-3 flex gap-2 overflow-x-auto pb-1">
              ${['Alle', 'Offen', 'In Bearbeitung', 'Abgeschlossen'].map(status => `
                <button onclick="state.filterStatus='${status}'; render()" class="whitespace-nowrap rounded-full px-3 py-2 text-xs font-medium ${state.filterStatus === status ? 'bg-red-700 text-white' : 'bg-zinc-100 text-slate-600'}">${status}</button>
              `).join('')}
            </div>
          </div>

          <div class="space-y-3">
            ${filtered.length ? filtered.map(visit => `
              <article class="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-zinc-200">
                <div class="flex items-start justify-between gap-3">
                  <div>
                    <div class="text-sm font-semibold text-slate-900">${visit.kundenname || 'Ohne Kundenname'}</div>
                    <div class="mt-1 text-xs text-slate-500">${visit.kundennummer || '—'} · ${visit.besuchsdatum || '—'}</div>
                  </div>
                  <span class="rounded-full bg-zinc-100 px-3 py-1 text-xs text-slate-600">${visit.status || '—'}</span>
                </div>
                <div class="mt-3 grid grid-cols-2 gap-2 text-xs text-slate-600">
                  <div><span class="font-medium text-slate-800">Techniker:</span> ${visit.techniker || '—'}</div>
                  <div><span class="font-medium text-slate-800">Besuchsart:</span> ${visit.besuchsart || '—'}</div>
                </div>
                <div class="mt-4 flex gap-2">
                  <button onclick="state.selectedVisit='${visit.id}'; render()" class="flex-1 rounded-2xl bg-zinc-100 px-3 py-3 text-sm font-medium text-slate-700">Details</button>
                  <button onclick="startEditVisit('${visit.id}')" class="flex-1 rounded-2xl bg-red-700 px-3 py-3 text-sm font-medium text-white">Bearbeiten</button>
                </div>
              </article>
            `).join('') : '<div class="rounded-3xl bg-white p-6 text-sm text-slate-500 shadow-sm ring-1 ring-zinc-200">Keine Besuche gefunden.</div>'}
          </div>
        </section>
      `;
    }

    function renderNeu() {
      const visit = state.form;
      return `
        <section class="space-y-4">
          <div class="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-zinc-200">
            <div class="flex items-center justify-between gap-3">
              <div>
                <div class="text-sm font-semibold text-slate-900">${state.editingVisitId ? 'Besuch bearbeiten' : 'Neuen Besuch anlegen'}</div>
                <div class="text-xs text-slate-500">Pflichtfelder bitte vollständig ausfüllen.</div>
              </div>
              ${state.editingVisitId ? '<button onclick="state.editingVisitId=null; state.form=emptyVisit(); render()" class="rounded-full bg-zinc-100 px-3 py-2 text-xs font-medium text-slate-600">Zurücksetzen</button>' : ''}
            </div>
          </div>

          <div class="space-y-3 rounded-3xl bg-white p-4 shadow-sm ring-1 ring-zinc-200">
            ${textField('besuchsdatum', 'Besuchsdatum', 'date')}
            ${textField('techniker', 'Techniker')}
            ${textField('kundennummer', 'Kundennummer')}
            ${textField('kundenname', 'Kundenname')}
            ${textField('ansprechperson', 'Ansprechperson')}
            ${textField('adm', 'ADM')}
            ${textField('angebotsnummer', 'Angebotsnummer')}
            ${textField('besuchsart', 'Besuchsart')}
            ${textField('maschine', 'Maschine')}
            ${textField('maschinenhersteller', 'Maschinenhersteller')}
            ${textField('aufnahme', 'Aufnahme')}
            ${textField('verfahren', 'Verfahren (kommagetrennt)')}
            ${textField('werkstoff', 'Werkstoff (kommagetrennt)')}
            ${textField('materialbezeichnung', 'Materialbezeichnung')}
            ${textField('bearbeitungsziel', 'Bearbeitungsziel')}
            ${textareaField('problemstellung', 'Problemstellung')}
            ${textareaField('empfehlung', 'Empfehlung')}
            ${textareaField('besuchsbericht', 'Besuchsbericht')}
            ${textField('ergebnis', 'Ergebnis')}
            ${textField('naechsteMassnahme', 'Nächste Maßnahme')}
            ${textField('verantwortlich', 'Verantwortlich')}
            ${textField('status', 'Status')}
            ${textField('prioritaet', 'Priorität')}
          </div>

          <button onclick="saveVisit()" class="w-full rounded-2xl bg-red-700 px-4 py-4 font-semibold text-white shadow-lg">${state.busy ? 'Speichert...' : 'Besuch speichern'}</button>
        </section>
      `;
    }

    function renderDashboard() {
      const s = stats();
      return `
        <section class="space-y-4">
          <div class="grid grid-cols-2 gap-3">
            ${dashboardCard('Gesamt', s.total)}
            ${dashboardCard('Offen', s.offen)}
            ${dashboardCard('In Bearbeitung', s.bearbeitung)}
            ${dashboardCard('Abgeschlossen', s.abgeschlossen)}
          </div>
          <div class="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-zinc-200">
            <div class="text-sm font-semibold text-slate-900">Techniker</div>
            <div class="mt-3 space-y-2 text-sm text-slate-600">
              ${s.techniker.length ? s.techniker.map(item => `<div class="flex items-center justify-between rounded-2xl bg-zinc-50 px-3 py-2"><span>${item.name}</span><span class="font-semibold text-slate-900">${item.count}</span></div>`).join('') : '<div>Keine Daten</div>'}
            </div>
          </div>
        </section>
      `;
    }

    function renderSettings() {
      return `
        <section class="space-y-4">
          <div class="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-zinc-200">
            <div class="text-sm font-semibold text-slate-900">Stammdaten</div>
            <div class="mt-2 text-xs text-slate-500">Die Stammdaten kommen aktuell aus der Live-Datei.</div>
          </div>
          ${stammgruppen.map(([key, label]) => `
            <div class="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-zinc-200">
              <div class="text-sm font-semibold text-slate-900">${label}</div>
              <div class="mt-2 flex flex-wrap gap-2">
                ${(state.masterData[key] || []).map(entry => `<span class="rounded-full bg-zinc-100 px-3 py-1 text-xs text-slate-700">${entry}</span>`).join('') || '<span class="text-xs text-slate-400">Keine Einträge</span>'}
              </div>
            </div>
          `).join('')}
        </section>
      `;
    }

    function renderDetail() {
      const visit = state.visits.find(v => v.id === state.selectedVisit);
      if (!visit) {
        state.selectedVisit = null;
        return renderBesuche();
      }
      return `
        <section class="space-y-4">
          <button onclick="state.selectedVisit=null; render()" class="rounded-full bg-zinc-100 px-3 py-2 text-xs font-medium text-slate-600">Zurück</button>
          <article class="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-zinc-200">
            <div class="flex items-start justify-between gap-3">
              <div>
                <div class="text-lg font-bold text-slate-900">${visit.kundenname || 'Ohne Kundenname'}</div>
                <div class="mt-1 text-xs text-slate-500">${visit.kundennummer || '—'} · ${visit.besuchsdatum || '—'}</div>
              </div>
              <span class="rounded-full bg-zinc-100 px-3 py-1 text-xs text-slate-600">${visit.status || '—'}</span>
            </div>
            <div class="mt-4 space-y-2 text-sm text-slate-700">
              ${detailRow('Techniker', visit.techniker)}
              ${detailRow('Ansprechperson', visit.ansprechperson)}
              ${detailRow('ADM', visit.adm)}
              ${detailRow('Besuchsart', visit.besuchsart)}
              ${detailRow('Maschine', visit.maschine)}
              ${detailRow('Maschinenhersteller', visit.maschinenhersteller)}
              ${detailRow('Aufnahme', visit.aufnahme)}
              ${detailRow('Verfahren', summarize(visit.verfahren))}
              ${detailRow('Werkstoff', summarize(visit.werkstoff))}
              ${detailRow('Materialbezeichnung', visit.materialbezeichnung)}
              ${detailRow('Bearbeitungsziel', visit.bearbeitungsziel)}
              ${detailRow('Problemstellung', visit.problemstellung)}
              ${detailRow('Empfehlung', visit.empfehlung)}
              ${detailRow('Besuchsbericht', visit.besuchsbericht)}
              ${detailRow('Ergebnis', visit.ergebnis)}
              ${detailRow('Nächste Maßnahme', visit.naechsteMassnahme)}
              ${detailRow('Verantwortlich', visit.verantwortlich)}
              ${detailRow('Priorität', visit.prioritaet)}
            </div>
          </article>
        </section>
      `;
    }

    function dashboardCard(label, value) {
      return `<div class="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-zinc-200"><div class="text-xs uppercase tracking-wide text-slate-500">${label}</div><div class="mt-2 text-2xl font-bold text-slate-900">${value}</div></div>`;
    }

    function detailRow(label, value) {
      return `<div><span class="font-semibold text-slate-900">${label}:</span> ${value || '—'}</div>`;
    }

    function textField(key, label, type = 'text') {
      let value = state.form[key] ?? '';
      if (Array.isArray(value)) value = value.join(', ');
      return `
        <label class="block space-y-1">
          <span class="text-sm font-medium text-slate-700">${label}</span>
          <input type="${type}" value="${escapeHtml(String(value))}" oninput="updateFormField('${key}', this.value)" class="w-full rounded-2xl border border-zinc-200 px-4 py-3 text-sm outline-none" />
        </label>
      `;
    }

    function textareaField(key, label) {
      const value = state.form[key] ?? '';
      return `
        <label class="block space-y-1">
          <span class="text-sm font-medium text-slate-700">${label}</span>
          <textarea rows="4" oninput="updateFormField('${key}', this.value)" class="w-full rounded-2xl border border-zinc-200 px-4 py-3 text-sm outline-none">${escapeHtml(String(value))}</textarea>
        </label>
      `;
    }

    function updateFormField(key, value) {
      if (key === 'verfahren' || key === 'werkstoff') {
        state.form[key] = value.split(',').map(item => item.trim()).filter(Boolean);
      } else {
        state.form[key] = value;
      }
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function render() {
      updateNav();
      if (!state.sessionReady) {
        app.innerHTML = '<div class="rounded-3xl bg-white p-6 text-sm text-slate-500 shadow-sm ring-1 ring-zinc-200">Verbindung wird vorbereitet...</div>';
        return;
      }
      switch (state.selectedVisit ? 'detail' : state.screen) {
        case 'start':
          app.innerHTML = renderStart();
          break;
        case 'besuche':
          app.innerHTML = renderBesuche();
          break;
        case 'neu':
          app.innerHTML = renderNeu();
          break;
        case 'dashboard':
          app.innerHTML = renderDashboard();
          break;
        case 'einstellungen':
          app.innerHTML = renderSettings();
          break;
        case 'detail':
          app.innerHTML = renderDetail();
          break;
        default:
          app.innerHTML = renderStart();
      }
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.selectedVisit = null;
        setScreen(btn.dataset.screen);
      });
    });

    document.getElementById('settingsHeaderBtn')?.addEventListener('click', () => {
      state.selectedVisit = null;
      setScreen('einstellungen');
    });

    loginForm.addEventListener('submit', async event => {
      event.preventDefault();
      hideLoginMessage();
      if (!supabaseEnabled) {
        showLoginMessage('Supabase ist nicht konfiguriert.');
        return;
      }
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        showLoginMessage(error.message);
        return;
      }
      document.getElementById('loginPassword').value = '';
    });

    logoutBtn.addEventListener('click', async () => {
      if (!supabaseEnabled) return;
      await supabaseClient.auth.signOut();
    });

    async function initSession() {
      if (!supabaseEnabled) {
        state.sessionReady = true;
        updateLoginState();
        render();
        return;
      }
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) {
        setStatus('Loginfehler', 'red');
      }
      state.currentUser = data?.session?.user || null;
      state.sessionReady = true;
      updateLoginState();
      await loadMasterData();
      if (state.currentUser) {
        await loadVisits();
      }
      render();
      supabaseClient.auth.onAuthStateChange(async (_event, session) => {
        state.currentUser = session?.user || null;
        updateLoginState();
        await loadMasterData();
        await loadVisits();
        render();
      });
    }

    initSession();
  </script>
</body>
</html>
