<!DOCTYPE html>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PICO Field App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: Inter, sans-serif; }
    .wuerth-red { color: #d4001a; }
    .bg-wuerth-red { background-color: #d4001a; }

</head>
<body class="bg-zinc-200 text-slate-900">
  <script>
    window.SUPABASE_URL = 'https://havbnbjvomsfgdvcluhw.supabase.co';
    window.SUPABASE_ANON_KEY = 'sb_publishable_zKW9ZOlNSmheSkJL0riodQ_H9OQPYE6';
  </script>
  <div class="mx-auto min-h-screen max-w-md bg-zinc-50 shadow-2xl">
    <header class="sticky top-0 z-10 border-b border-zinc-200 bg-white/95 px-4 py-4 backdrop-blur">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-white shadow-sm ring-1 ring-zinc-200">
            <svg viewBox="0 0 64 64" class="h-8 w-8" aria-hidden="true">
              <rect x="8" y="8" width="48" height="48" rx="8" fill="#d4001a"></rect>
              <rect x="18" y="18" width="28" height="28" fill="#ffffff"></rect>
              <rect x="24" y="24" width="16" height="16" fill="#d4001a"></rect>
            </svg>
          </div>
          <div>
            <div class="text-xs font-semibold uppercase tracking-[0.2em] text-red-700">WÜRTH Kundenbesuche</div>
            <h1 class="text-lg font-bold">Anwendungstechnik</h1>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button id="logoutBtn" class="hidden rounded-full bg-red-700 px-3 py-2 text-xs font-medium text-white">Abmelden</button>
          <div id="appStatusBadge" class="rounded-full bg-amber-100 px-3 py-1 text-xs font-medium text-amber-700">Offline Test</div>
        </div>
      </div>
    </header>

    <main id="app" class="px-4 py-4 pb-24"></main>

    <div id="loginOverlay" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/80 p-6">
      <div class="w-full max-w-sm rounded-3xl bg-white p-6 shadow-2xl">
        <div class="text-xs font-semibold uppercase tracking-[0.2em] text-red-700">Wuerth Kundenbesuche</div>
        <h2 class="mt-2 text-2xl font-bold text-slate-900">Anmelden</h2>
        <p class="mt-2 text-sm text-slate-500">Bitte mit deiner E-Mail und deinem Passwort anmelden, um auf die Kundenbesuche zuzugreifen.</p>
        <form id="loginForm" class="mt-6 space-y-4">
          <label class="block space-y-1">
            <span class="text-sm font-medium text-slate-700">E-Mail</span>
            <input id="loginEmail" type="email" class="w-full rounded-xl border border-slate-300 px-3 py-3 text-sm outline-none" placeholder="name@firma.de" required />
          </label>
          <label class="block space-y-1">
            <span class="text-sm font-medium text-slate-700">Passwort</span>
            <input id="loginPassword" type="password" class="w-full rounded-xl border border-slate-300 px-3 py-3 text-sm outline-none" placeholder="Passwort" required />
          </label>
          <div id="loginMessage" class="hidden rounded-xl bg-red-50 px-3 py-3 text-sm text-red-700"></div>
          <button type="submit" class="w-full rounded-2xl bg-red-700 px-4 py-4 font-semibold text-white shadow-lg">Anmelden</button>
        </form>
      </div>
    </div>

    <nav class="fixed bottom-0 left-1/2 z-20 flex w-full max-w-md -translate-x-1/2 border-t border-zinc-200 bg-white">
      <button data-screen="start" class="nav-btn flex-1 px-2 py-3 text-center text-xs text-blue-600">
        <div class="text-lg">🏠</div>
        <div>Start</div>
      </button>
      <button data-screen="besuche" class="nav-btn flex-1 px-2 py-3 text-center text-xs text-slate-500">
        <div class="text-lg">📋</div>
        <div>Besuche</div>
      </button>
      <button data-screen="neu" class="nav-btn flex-1 px-2 py-3 text-center text-xs text-slate-500">
        <div class="text-lg">➕</div>
        <div>Neu</div>
      </button>
      <button data-screen="dashboard" class="nav-btn flex-1 px-2 py-3 text-center text-xs text-slate-500">
        <div class="text-lg">📊</div>
        <div>Dashboard</div>
      </button>
      <button data-screen="einstellungen" class="nav-btn flex-1 px-2 py-3 text-center text-xs text-slate-500">
        <div class="text-lg">⚙️</div>
        <div>Mehr</div>
      </button>
    </nav>
  </div>

  <script>
    const supabaseEnabled = window.SUPABASE_URL && window.SUPABASE_ANON_KEY;
    const supabaseClient = supabaseEnabled ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY) : null;

    const defaultMasterData = {
      techniker: ["Fabian Klink", "Jose Batista"],
      aufnahme: ["HSK63F", "SK30", "SK30 ohne Mitnehmernut"],
      verfahren: ["Auralix", "Mono-Zerspanung", "ISO-Drehen"],
      besuchsarten: ["Erstbesuch", "Nachverfolgung", "Testlauf", "Reklamation", "Beratung vor Ort", "Beratung Teams", "Optimierung", "Angebotsbesprechung", "Maschinenaufnahme", "Schulung"],
      werkstoffe: ["Stahl", "Edelstahl", "Guss", "Aluminium", "Aluminiumprofil", "Titan", "Superlegierung", "Kunststoff", "Kunstoffprofil", "Kupfer/Messing", "Sonstiges"],
      kuehlmedien: ["KSS", "Luft"],
      bearbeitungsziele: ["Prozessoptimierung", "Werkzeugauswahl", "Standzeit", "Oberflächengüte", "Taktzeit", "Prozesssicherheit", "Neuanwendung", "Kostenreduktion"],
      ergebnisse: ["Erfolgreich", "In Prüfung", "Ohne Ergebnis", "Folgeversuch notwendig", "Angebot erforderlich"],
      status: ["Offen", "In Bearbeitung", "Abgeschlossen"],
      prioritaeten: ["Niedrig", "Mittel", "Hoch"],
      massnahmen: ["Muster senden", "Angebot erstellen", "Rückruf", "Folgetermin", "Werkzeugtest", "Interne Klärung", "Dokumentation senden", "Keine"]
    };

    const stammgruppen = [
      ["techniker", "Techniker"],
      ["aufnahme", "Aufnahmen"],
      ["verfahren", "Verfahren"],
      ["besuchsarten", "Besuchsarten"],
      ["werkstoffe", "Werkstoffe"],
      ["kuehlmedien", "Kühlmedien"],
      ["bearbeitungsziele", "Bearbeitungsziele"],
      ["ergebnisse", "Ergebnisse"],
      ["status", "Status"],
      ["prioritaeten", "Prioritäten"],
      ["massnahmen", "Maßnahmen"]
    ];

    const emptyVisit = () => ({
      id: null,
      berichtstyp: "werkzeugversuch",
      besuchsdatum: new Date().toISOString().slice(0, 10),
      techniker: "",
      kundennummer: "",
      taetigkeitsfeld: [],
      taetigkeitsfeldSonstiges: "",
      kundenname: "",
      ansprechperson: "",
      adm: "",
      angebotsnummer: "",
      besuchsart: "",
      maschine: "",
      maschinenhersteller: "",
      aufnahme: "",
      verfahren: [],
      werkstoff: [],
      materialbezeichnung: "",
      kuehlmedium: [],
      barDruck: "",
      erstanamneseMaschinen: [
        {
          maschine: "",
          maschinenhersteller: "",
          aufnahme: "",
          verfahren: [],
          werkstoff: [],
          kuehlmedium: [],
          barDruck: "",
          bemerkung: ""
        }
      ],
      bearbeitungsziel: [],
      problemstellung: "",
      empfehlung: "",
      besuchsbericht: "",
      ergebnis: "",
      naechsteMassnahme: [],
      verantwortlich: "",
      status: "Offen",
      prioritaet: "Mittel",
      bildVorhanden: false,
      bilder: [],
      createdBy: null,
      updatedBy: null,
      createdAt: null,
      updatedAt: null
    });

    const state = {
      screen: "start",
      search: "",
      filterStatus: "Alle",
      technikerFilter: "",
      besuchsartFilter: "",
      taetigkeitsfeldFilter: "",
      prioritaetFilter: "",
      missingMassnahmeOnly: false,
      missingErgebnisOnly: false,
      overdueOnly: false,
      selectedVisit: null,
      fullImageVisit: null,
      editingVisitId: null,
      form: emptyVisit(),
      formErrors: {},
      settingsDraft: {},
      visits: [],
      visitFiles: {},
      pendingFiles: [],
      currentUser: null,
      sessionReady: false,
      loading: false,
      busy: false,
      masterData: structuredClone(defaultMasterData)
    };

    function resetSettingsDraft() {
      const draft = {};
      stammgruppen.forEach(([key]) => {
        draft[key] = "";
      });
      state.settingsDraft = draft;
    }
    resetSettingsDraft();

    const app = document.getElementById('app');
    const loginOverlay = document.getElementById('loginOverlay');
    const loginForm = document.getElementById('loginForm');
    const loginMessage = document.getElementById('loginMessage');
    const logoutBtn = document.getElementById('logoutBtn');
    const appStatusBadge = document.getElementById('appStatusBadge');

    function setStatus(text, tone = 'amber') {
      const tones = {
        amber: 'rounded-full bg-amber-100 px-3 py-1 text-xs font-medium text-amber-700',
        green: 'rounded-full bg-emerald-100 px-3 py-1 text-xs font-medium text-emerald-700',
        red: 'rounded-full bg-red-100 px-3 py-1 text-xs font-medium text-red-700'
      };
      appStatusBadge.className = tones[tone] || tones.amber;
      appStatusBadge.textContent = text;
    }

    function showLoginMessage(message) {
      loginMessage.textContent = message;
      loginMessage.classList.remove('hidden');
    }

    function hideLoginMessage() {
      loginMessage.classList.add('hidden');
      loginMessage.textContent = '';
    }

    function updateLoginState() {
      const loggedIn = !!state.currentUser;
      loginOverlay.style.display = loggedIn ? 'none' : 'flex';
      logoutBtn.classList.toggle('hidden', !loggedIn);
      setStatus(loggedIn ? 'Verbunden' : 'Anmeldung nötig', loggedIn ? 'green' : 'amber');
    }

    function rules(visit) {
      const isReklamation = visit.besuchsart === 'Reklamation';
      const isSchulung = visit.besuchsart === 'Schulung';
      const isFabian = visit.techniker === 'Fabian Klink';
      return {
        problemPflicht: isReklamation,
        bilderPflicht: isReklamation,
        berichtPflicht: isFabian,
        maschineOptional: isSchulung,
        aufnahmePflicht: isFabian,
        werkstoffPflicht: isFabian || isReklamation
      };
    }

    function stats() {
      const total = state.visits.length;
      const offen = state.visits.filter(v => v.status === 'Offen').length;
      const bearbeitung = state.visits.filter(v => v.status === 'In Bearbeitung').length;
      const abgeschlossen = state.visits.filter(v => v.status === 'Abgeschlossen').length;
      const hohePrioritaet = state.visits.filter(v => v.prioritaet === 'Hoch').length;
      const offeneHohePrioritaet = state.visits.filter(v => v.prioritaet === 'Hoch' && v.status !== 'Abgeschlossen').length;
      const reklamationen = state.visits.filter(v => v.besuchsart === 'Reklamation').length;
      const offeneReklamationen = state.visits.filter(v => v.besuchsart === 'Reklamation' && v.status !== 'Abgeschlossen').length;
      const ohneMassnahme = state.visits.filter(v => !Array.isArray(v.naechsteMassnahme) || !v.naechsteMassnahme.length).length;
      const ohneErgebnis = state.visits.filter(v => !v.ergebnis).length;
      const ueberfaellig = state.visits.filter(v => v.status !== 'Abgeschlossen' && ageInDays(v.besuchsdatum) >= 14).length;
      const offeneQuote = total ? Math.round((offen / total) * 100) : 0;
      const aktivQuote = total ? Math.round(((offen + bearbeitung) / total) * 100) : 0;
      const topOffeneTechniker = [...new Set(state.visits.map(v => v.techniker).filter(Boolean))]
        .map(name => ({ name, count: state.visits.filter(v => v.techniker === name && v.status !== 'Abgeschlossen').length }))
        .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name))[0] || null;
      const technikerNames = [...new Set([
        ...(state.masterData.techniker || []),
        ...state.visits.map(v => v.techniker).filter(Boolean)
      ])];
      const techniker = technikerNames.map(name => {
        const visits = state.visits.filter(v => v.techniker === name);
        const typenMap = {};
        visits.forEach(v => {
          const key = v.besuchsart || 'Ohne Besuchsart';
          typenMap[key] = (typenMap[key] || 0) + 1;
        });
        const typen = Object.entries(typenMap)
          .map(([type, count]) => ({ type, count }))
          .sort((a, b) => b.count - a.count || a.type.localeCompare(b.type));
        return {
          name,
          count: visits.length,
          offen: visits.filter(v => v.status === 'Offen').length,
          typen
        };
      }).sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));

      const besuchsartenMap = {};
      state.visits.forEach(v => {
        const key = v.besuchsart || 'Ohne Besuchsart';
        besuchsartenMap[key] = (besuchsartenMap[key] || 0) + 1;
      });
      const besuchsarten = Object.entries(besuchsartenMap)
        .map(([name, count]) => ({ name, count }))
        .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));

      const taetigkeitsfeldMap = {};
      state.visits.forEach(v => {
        const fields = Array.isArray(v.taetigkeitsfeld) ? v.taetigkeitsfeld : (v.taetigkeitsfeld ? [v.taetigkeitsfeld] : []);
        fields.forEach(field => {
          const key = field || 'Ohne Tätigkeitsfeld';
          taetigkeitsfeldMap[key] = (taetigkeitsfeldMap[key] || 0) + 1;
        });
      });
      const taetigkeitsfelder = Object.entries(taetigkeitsfeldMap)
        .map(([name, count]) => ({ name, count }))
        .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));

      const abschlussquote = total ? Math.round((abgeschlossen / total) * 100) : 0;

      return {
        total,
        offen,
        bearbeitung,
        abgeschlossen,
        hohePrioritaet,
        offeneHohePrioritaet,
        reklamationen,
        offeneReklamationen,
        ohneMassnahme,
        ohneErgebnis,
        ueberfaellig,
        offeneQuote,
        aktivQuote,
        topOffeneTechniker,
        abschlussquote,
        technikerAktiv: techniker.filter(t => t.count > 0).length,
        techniker,
        besuchsarten,
        taetigkeitsfelder
      };
    }

    function renderTechnikerBreakdown(list, total) {
      if (!list.length) return '<div class="text-sm text-slate-500">Noch keine Techniker-Daten vorhanden.</div>';
      return list.map(t => `
        <button type="button" data-techniker-filter="${escapeHtml(t.name)}" class="w-full rounded-2xl border border-zinc-200 p-3 text-left transition hover:-translate-y-0.5 hover:shadow-md">
          <div class="mb-2 flex justify-between text-sm">
            <span class="font-semibold">${escapeHtml(t.name)}</span>
            <span class="font-semibold">${t.count}</span>
          </div>
          <div class="mb-3 h-2 rounded-full bg-zinc-200">
            <div class="h-2 rounded-full bg-red-600" style="width:${total ? Math.max((t.count / total) * 100, t.count > 0 ? 8 : 0) : 0}%"></div>
          </div>
          <div class="space-y-2">
            ${t.typen.length ? t.typen.map(item => `
              <div>
                <div class="mb-1 flex justify-between text-xs text-slate-600">
                  <span>${escapeHtml(item.type)}</span>
                  <span class="font-semibold text-slate-900">${item.count}</span>
                </div>
                <div class="h-2 rounded-full bg-zinc-100">
                  <div class="h-2 rounded-full bg-slate-500" style="width:${t.count ? Math.max((item.count / t.count) * 100, item.count > 0 ? 10 : 0) : 0}%"></div>
                </div>
              </div>
            `).join('') : '<div class="text-xs text-slate-400">Noch keine Besuchsarten vorhanden.</div>'}
          </div>
        </button>
      `).join('');
    }

    function setScreen(screen) {
      state.screen = screen;
      render();
    }

    function resetAllVisitFilters() {
      state.search = '';
      state.technikerFilter = '';
      state.besuchsartFilter = '';
      state.taetigkeitsfeldFilter = '';
      state.prioritaetFilter = '';
      state.missingMassnahmeOnly = false;
      state.missingErgebnisOnly = false;
      state.overdueOnly = false;
      state.filterStatus = 'Alle';
    }

    function setStatFilter(status) {
      resetAllVisitFilters();
      state.filterStatus = status;
      state.selectedVisit = null;
      setScreen('besuche');
    }

    function setTechnikerFilter(name) {
      resetAllVisitFilters();
      state.technikerFilter = name || '';
      state.selectedVisit = null;
      setScreen('besuche');
    }

    function setBesuchsartFilter(name) {
      resetAllVisitFilters();
      state.besuchsartFilter = name || '';
      state.selectedVisit = null;
      setScreen('besuche');
    }

    function setTaetigkeitsfeldFilter(name) {
      resetAllVisitFilters();
      state.taetigkeitsfeldFilter = name || '';
      state.selectedVisit = null;
      setScreen('besuche');
    }

    function setPriorityStatusFilter(priority, status = 'Alle') {
      resetAllVisitFilters();
      state.prioritaetFilter = priority || '';
      state.filterStatus = status;
      state.selectedVisit = null;
      setScreen('besuche');
    }

    function setMissingFieldFilter(type) {
      resetAllVisitFilters();
      if (type === 'massnahme') state.missingMassnahmeOnly = true;
      if (type === 'ergebnis') state.missingErgebnisOnly = true;
      state.selectedVisit = null;
      setScreen('besuche');
    }

    function setOverdueFilter() {
      resetAllVisitFilters();
      state.overdueOnly = true;
      state.selectedVisit = null;
      setScreen('besuche');
    }

    function clearTechnikerFilter() {
      state.technikerFilter = '';
      render();
    }

    function clearBesuchsartFilter() {
      state.besuchsartFilter = '';
      render();
    }

    function clearTaetigkeitsfeldFilter() {
      state.taetigkeitsfeldFilter = '';
      render();
    }

    function updateNav() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        const active = btn.dataset.screen === state.screen;
        btn.className = `nav-btn flex-1 px-2 py-3 text-center text-xs ${active ? 'text-red-700' : 'text-slate-500'}`;
      });
    }

    function renderStart() {
      const s = stats();
      return `
        <div class="space-y-4">
          <div class="rounded-3xl bg-gradient-to-br from-red-700 to-red-500 p-5 text-white shadow-lg">
            <div class="text-sm opacity-90">Mobile Dokumentation vor Ort</div>
            <div class="mt-1 text-2xl font-bold">Kundenbesuche schnell erfassen</div>
            <p class="mt-2 text-sm text-red-50">V1.1 mit Login, zentraler Speicherung, Dateiupload und Management-Ueberblick.</p>
            <div class="mt-4 flex gap-2">
              <button id="newVisitBtn" class="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-red-700 shadow">Neuer Besuch</button>
              <button id="settingsStartBtn" class="rounded-2xl bg-red-900 px-4 py-3 text-sm font-semibold text-white shadow">Stammdaten pflegen</button>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            ${statCard('Gesamtbesuche', s.total, 'bg-white', 'Alle')}
            ${statCard('Offen', s.offen, 'bg-amber-50', 'Offen')}
            ${statCard('Abgeschlossen', s.abgeschlossen, 'bg-emerald-50', 'Abgeschlossen')}
            ${statCard('In Bearbeitung', s.bearbeitung, 'bg-red-50', 'In Bearbeitung')}
          </div>
          <div class="rounded-2xl bg-white p-4 shadow-sm">
            <div class="mb-3 text-sm font-semibold">Besuche pro Techniker</div>
            <div class="space-y-3">
              ${renderTechnikerBreakdown(s.techniker, s.total)}
            </div>
          </div>
          <div class="rounded-2xl bg-white p-4 shadow-sm">
            <div class="mb-3 text-sm font-semibold">Besuchsarten auf einen Blick</div>
            <div class="grid grid-cols-1 gap-2">
              ${s.besuchsarten.length ? s.besuchsarten.map(item => `
                <button type="button" data-besuchsart-filter="${escapeAttr(item.name)}" class="flex items-center justify-between rounded-xl bg-zinc-100 px-3 py-3 text-sm transition hover:-translate-y-0.5 hover:shadow-md">
                  <span>${escapeHtml(item.name)}</span>
                  <span class="rounded-full bg-red-700 px-2 py-1 text-xs font-semibold text-white">${item.count}</span>
                </button>
              `).join('') : '<div class="text-sm text-slate-500">Noch keine Besuchsarten vorhanden.</div>'}
            </div>
          </div>
        </div>
      `;
    }

    function renderBesuche() {
      const taetigkeitsfeldOptions = ['Alle', 'Zerspanung Metall', 'Fenster / Tür / Wintergarten', 'Pfosten-Riegelfassade', 'Sonstiges'];
      const filtered = state.visits.filter(v => {
        const taetigkeitsfelder = Array.isArray(v.taetigkeitsfeld) ? v.taetigkeitsfeld : (v.taetigkeitsfeld ? [v.taetigkeitsfeld] : []);
        const massnahmen = Array.isArray(v.naechsteMassnahme) ? v.naechsteMassnahme : (v.naechsteMassnahme ? [v.naechsteMassnahme] : []);
        const text = [v.kundenname, v.kundennummer, v.techniker, v.problemstellung, v.besuchsart, ...taetigkeitsfelder].join(' ').toLowerCase();
        const matchesSearch = text.includes(state.search.toLowerCase());
        const matchesStatus = state.filterStatus === 'Alle' || v.status === state.filterStatus;
        const matchesTechniker = !state.technikerFilter || v.techniker === state.technikerFilter;
        const matchesBesuchsart = !state.besuchsartFilter || v.besuchsart === state.besuchsartFilter;
        const matchesTaetigkeitsfeld = !state.taetigkeitsfeldFilter || taetigkeitsfelder.includes(state.taetigkeitsfeldFilter);
        const matchesPrioritaet = !state.prioritaetFilter || v.prioritaet === state.prioritaetFilter;
        const matchesMissingMassnahme = !state.missingMassnahmeOnly || !massnahmen.length;
        const matchesMissingErgebnis = !state.missingErgebnisOnly || !v.ergebnis;
        const matchesOverdue = !state.overdueOnly || (v.status !== 'Abgeschlossen' && ageInDays(v.besuchsdatum) >= 14);
        return matchesSearch && matchesStatus && matchesTechniker && matchesBesuchsart && matchesTaetigkeitsfeld && matchesPrioritaet && matchesMissingMassnahme && matchesMissingErgebnis && matchesOverdue;
      });

      return `
        <div class="space-y-4">
          <div class="space-y-3 rounded-2xl bg-white p-4 shadow-sm">

    function visitCard(v) {
      const taetigkeitsfeld = Array.isArray(v.taetigkeitsfeld) ? v.taetigkeitsfeld.filter(Boolean).join(', ') : (v.taetigkeitsfeld || '-');
      const naechsteMassnahme = Array.isArray(v.naechsteMassnahme) ? v.naechsteMassnahme.filter(Boolean).join(', ') : (v.naechsteMassnahme || '-');
      const priorityStyles = {
        Hoch: 'bg-red-700 text-white ring-1 ring-red-700/10',
        Mittel: 'bg-amber-50 text-amber-800 ring-1 ring-amber-200',
        Niedrig: 'bg-emerald-50 text-emerald-800 ring-1 ring-emerald-200'
      };
      const statusStyles = {
        Offen: 'bg-slate-800 text-white ring-1 ring-slate-800/10',
        'In Bearbeitung': 'bg-slate-100 text-slate-800 ring-1 ring-slate-200',
        Abgeschlossen: 'bg-emerald-50 text-emerald-800 ring-1 ring-emerald-200'
      };
      return `
        <div class="overflow-hidden rounded-3xl border border-zinc-200/80 bg-white shadow-[0_10px_30px_rgba(15,23,42,0.06)] transition hover:-translate-y-0.5 hover:shadow-[0_16px_40px_rgba(15,23,42,0.10)]">
          <div class="h-1 bg-gradient-to-r from-red-700 via-red-600 to-red-500"></div>
          <div class="p-4">
            <div class="flex items-start justify-between gap-4">
              <div class="min-w-0 flex-1">
                <button data-visit-id="${v.id}" class="visit-btn w-full text-left">
                  <div class="text-lg font-bold leading-tight tracking-tight text-slate-900">${escapeHtml(v.kundenname || 'Ohne Kundenname')}</div>
                </button>

                <div class="mt-3 space-y-2.5">
                  <div class="rounded-2xl border border-zinc-200/80 bg-zinc-50/80 px-3.5 py-3 shadow-[inset_0_1px_0_rgba(255,255,255,0.7)]">
                    <div class="flex items-center justify-between gap-3">
                      <div class="min-w-0 flex-1">
                        <div class="text-[10px] font-semibold uppercase tracking-[0.18em] text-slate-400">Kundennummer</div>
                        <div class="mt-1 text-sm font-bold text-slate-900 break-all">${escapeHtml(v.kundennummer || '-')}</div>
                      </div>
                      <button type="button" data-copy-kundennummer="${escapeAttr(v.kundennummer || '')}" class="rounded-xl border border-zinc-200 bg-white px-3 py-2 text-[11px] font-semibold text-red-700 shadow-sm transition hover:bg-red-50">Kopieren</button>
                    </div>
                  </div>

                  <button data-visit-id="${v.id}" class="visit-btn rounded-2xl text-left">
                    <div class="text-[10px] font-semibold uppercase tracking-[0.18em] text-slate-400">Anwendungstechniker</div>
                    <div class="mt-1 text-sm font-medium text-slate-800">${escapeHtml(v.techniker || '-')}</div>
                  </button>
                </div>
              </div>

              <div class="shrink-0 rounded-2xl border border-zinc-200/80 bg-zinc-50/80 px-3 py-2.5 text-right shadow-[inset_0_1px_0_rgba(255,255,255,0.7)]">
                <div class="text-[10px] font-semibold uppercase tracking-[0.18em] text-slate-400">Datum</div>
                <div class="mt-1 text-sm font-semibold text-slate-700">${escapeHtml(v.besuchsdatum || '-')}</div>
              </div>
            </div>

            <button data-visit-id="${v.id}" class="visit-btn mt-4 block w-full text-left">
              <div class="space-y-3">
                <div class="rounded-2xl border border-zinc-200/80 bg-zinc-50/70 px-3.5 py-3">
                  <div class="text-[10px] font-semibold uppercase tracking-[0.18em] text-slate-400">Tätigkeitsfeld</div>
                  <div class="mt-1 text-sm font-medium leading-5 text-slate-800">${escapeHtml(taetigkeitsfeld || '-')}</div>
                </div>

                <div class="flex flex-wrap gap-2">
                  <span class="rounded-full px-2.5 py-1.5 text-[11px] font-bold ${priorityStyles[v.prioritaet] || 'bg-slate-100 text-slate-700 ring-1 ring-slate-200'}">Priorität: ${escapeHtml(v.prioritaet || '-')}</span>
                  <span class="rounded-full px-2.5 py-1.5 text-[11px] font-bold ${statusStyles[v.status] || 'bg-slate-100 text-slate-700 ring-1 ring-slate-200'}">Status: ${escapeHtml(v.status || '-')}</span>
                </div>

                <div class="rounded-2xl border border-red-100 bg-gradient-to-br from-red-50 to-white px-3.5 py-3">
                  <div class="text-[10px] font-semibold uppercase tracking-[0.18em] text-red-400">Nächste Maßnahme</div>
                  <div class="mt-1 text-sm font-semibold leading-5 text-slate-800">${escapeHtml(naechsteMassnahme || '-')}</div>
                </div>
              </div>
            </button>
          </div>
        </div>
      `;
    }

        <div class="space-y-4">
          <form id="visitForm" class="space-y-4">

                <button type="button" data-berichtstyp="erstanamnese" class="rounded-2xl px-4 py-4 text-sm font-semibold ${berichtstyp === 'erstanamnese' ? 'bg-red-700 text-white shadow-lg' : 'bg-white text-slate-700 border border-slate-300'}">Erstanamnese</button>

            ${section('Basisdaten', `

              ${field('taetigkeitsfeld', 'Tätigkeitsfeld', select('taetigkeitsfeld', ['Zerspanung Metall', 'Fenster / Tür / Wintergarten', 'Pfosten-Riegelfassade', 'Sonstiges'], state.form.taetigkeitsfeld?.[0] || '', true, 'taetigkeitsfeld', 'data-render-on-change="true"'))}

              ${field('kundenname', 'Kundenname', `<input name="kundenname" value="${escapeHtml(state.form.kundenname)}" class="${inputClass('kundenname')}" />`)}
              ${field('ansprechperson', 'Ansprechperson Kunde', `<input name="ansprechperson" value="${escapeHtml(state.form.ansprechperson)}" class="${inputClass('ansprechperson')}" />`)}
              ${field('adm', 'Zuständiger ADM', `<input name="adm" value="${escapeHtml(state.form.adm)}" class="${inputClass('adm')}" />`)}
              ${field('angebotsnummer', 'Angebotsnummer', `<input name="angebotsnummer" value="${escapeHtml(state.form.angebotsnummer)}" class="${inputClass('angebotsnummer')}" />`)}
            `)}
            ${berichtstyp === 'werkzeugversuch' ? `
              ${section('Besuchs- und Einsatzdaten', `
                ${field('besuchsart', 'Besuchsart', select('besuchsart', state.masterData.besuchsarten || [], state.form.besuchsart, true, 'besuchsart'), true)}
                ${field('maschinenhersteller', 'Maschinenhersteller', `<input name="maschinenhersteller" value="${escapeHtml(state.form.maschinenhersteller)}" class="${inputClass('maschinenhersteller')}" />`, true)}
                ${field('maschine', 'Maschine', `<input name="maschine" value="${escapeHtml(state.form.maschine)}" class="${inputClass('maschine')}" />`)}
                ${field('aufnahme', 'Aufnahme', select('aufnahme', state.masterData.aufnahme || [], state.form.aufnahme, true, 'aufnahme'))}
                ${field('verfahren', 'Verfahren', multiSelectButtons('verfahren', state.masterData.verfahren || [], state.form.verfahren))}
                ${field('werkstoff', 'Werkstoff', multiSelectButtons('werkstoff', state.masterData.werkstoffe || [], state.form.werkstoff))}
                ${field('materialbezeichnung', 'Materialbezeichnung', `<input name="materialbezeichnung" value="${escapeHtml(state.form.materialbezeichnung)}" class="${inputClass('materialbezeichnung')}" />`)}
                ${field('kuehlmedium', 'Kühlmedium', multiSelectButtons('kuehlmedium', state.masterData.kuehlmedien || ['KSS', 'Luft'], state.form.kuehlmedium || []))}
                ${field('barDruck', 'BAR / Druck', `<input name="barDruck" value="${escapeHtml(state.form.barDruck)}" class="${inputClass('barDruck')}" />`)}
                ${field('bearbeitungsziel', 'Bearbeitungsziel', multiSelectButtons('bearbeitungsziel', state.masterData.bearbeitungsziele || [], state.form.bearbeitungsziel || []))}
              `)}
            ` : `
              ${section('Erstanamnese - Maschinen beim Kunden', `
                <div class="space-y-4">
                  <div class="rounded-xl bg-amber-50 px-3 py-3 text-sm text-amber-800">Bitte alle Angaben sauber pro Maschine erfassen. So bleibt Aufnahme, Werkstoff, Kühlmedium und Druck eindeutig zur jeweiligen Maschine zugeordnet.</div>
                  ${(state.form.erstanamneseMaschinen || []).map((machine, index) => machineCard(machine, index)).join('')}
                  <button type="button" id="addMachineBtn" class="w-full rounded-2xl bg-zinc-800 px-4 py-4 text-sm font-semibold text-white shadow">+ Weitere Maschine hinzufügen</button>
                </div>
              `)}
            `}
            ${section('Technische Dokumentation', `
              ${field('problemstellung', 'Problemstellung (Stichworte)', `<textarea name="problemstellung" rows="3" class="${inputClass('problemstellung')}">${escapeHtml(state.form.problemstellung)}</textarea>`)}
              ${field('empfehlung', 'Empfehlung / Lösung', `<textarea name="empfehlung" rows="3" class="${inputClass('empfehlung')}">${escapeHtml(state.form.empfehlung)}</textarea>`)}
              ${field('besuchsbericht', 'Besuchsbericht', `<textarea name="besuchsbericht" rows="4" class="${inputClass('besuchsbericht')}">${escapeHtml(state.form.besuchsbericht)}</textarea>`)}
              ${field('ergebnis', 'Ergebnis', select('ergebnis', state.masterData.ergebnisse || [], state.form.ergebnis, true, 'ergebnis'))}
              ${field('naechsteMassnahme', 'Nächste Maßnahme', multiSelectButtons('naechsteMassnahme', state.masterData.massnahmen || [], state.form.naechsteMassnahme || []))}

              </div>

              ${state.editingVisitId ? '<button type="button" id="cancelEditBtn" class="w-full rounded-2xl border border-zinc-300 bg-white px-4 py-4 font-semibold text-slate-700 shadow-sm">Abbrechen</button>' : ''}
            </div>
          </form>
        </div>
      `;
    }

    function renderDashboard() {
      const s = stats();
      const totalKnown = Math.max(s.total, 1);
      const kpiConfig = [
        { title: 'Gesamtbesuche', value: s.total, subline: 'Alle Besuche anzeigen', color: 'bg-white', action: { type: 'stat', value: 'Alle' } },
        { title: 'Offen', value: s.offen, subline: `${s.offeneQuote}% des Gesamtbestands`, color: 'bg-amber-50', action: { type: 'stat', value: 'Offen' } },
        { title: 'In Bearbeitung', value: s.bearbeitung, subline: 'Aktive laufende Vorgänge', color: 'bg-red-50', action: { type: 'stat', value: 'In Bearbeitung' } },
        { title: 'Abgeschlossen', value: s.abgeschlossen, subline: `${s.abschlussquote}% Abschlussquote`, color: 'bg-emerald-50', action: { type: 'stat', value: 'Abgeschlossen' } }
      ];
      return `
        <div class="space-y-4">
          <div class="rounded-3xl bg-gradient-to-br from-slate-950 via-slate-900 to-red-900 p-5 text-white shadow-xl">

              <div>
                <div class="text-xs font-semibold uppercase tracking-[0.24em] text-red-200">Dashboard</div>
                <div class="mt-1 text-2xl font-bold">Management-Überblick & Handlungsbedarf</div>
                <p class="mt-2 text-sm text-slate-200">Kennzahlen, Engpässe und direkte Sprünge in die jeweils relevanten Berichte.</p>
              </div>
              <button type="button" data-stat-filter="Abgeschlossen" class="rounded-2xl bg-white/10 px-4 py-3 text-right backdrop-blur transition hover:bg-white/15">
                <div class="text-xs uppercase tracking-wide text-slate-300">Abschlussquote</div>
                <div class="mt-1 text-3xl font-bold">${s.abschlussquote}%</div>
              </button>
            </div>
            <div class="mt-4 grid grid-cols-3 gap-3 text-sm">
              <button type="button" data-stat-filter="Offen" class="rounded-2xl bg-white/10 px-3 py-3 text-left transition hover:bg-white/15">
                <div class="text-xs uppercase tracking-wide text-slate-300">Offene Quote</div>
                <div class="mt-1 text-2xl font-bold text-white">${s.offeneQuote}%</div>
              </button>
              <button type="button" data-priority-status-filter="Hoch" data-priority-status="Offen" class="rounded-2xl bg-white/10 px-3 py-3 text-left transition hover:bg-white/15">
                <div class="text-xs uppercase tracking-wide text-slate-300">Kritisch offen</div>
                <div class="mt-1 text-2xl font-bold text-white">${s.offeneHohePrioritaet}</div>
              </button>
              <button type="button" data-techniker-filter="${escapeAttr(s.topOffeneTechniker?.name || '')}" class="rounded-2xl bg-white/10 px-3 py-3 text-left transition hover:bg-white/15 ${s.topOffeneTechniker?.name ? '' : 'pointer-events-none opacity-60'}">
                <div class="text-xs uppercase tracking-wide text-slate-300">Meiste offene Fälle</div>
                <div class="mt-1 text-sm font-semibold text-white">${escapeHtml(s.topOffeneTechniker?.name || 'Noch keine Daten')}</div>
                <div class="mt-1 text-xl font-bold text-white">${s.topOffeneTechniker?.count || 0}</div>
              </button>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            ${kpiConfig.map(item => metricCard(item)).join('')}
          </div>

          <div class="grid grid-cols-2 gap-3">
            ${actionCard('Hohe Priorität', s.hohePrioritaet, 'Alle Besuche mit hoher Priorität anzeigen', 'red', 'data-priority-status-filter="Hoch" data-priority-status="Alle"')}
            ${actionCard('Reklamationen', s.reklamationen, 'Direkt zu allen Reklamationen springen', 'orange', 'data-besuchsart-filter="Reklamation"')}
          </div>

          <div class="rounded-2xl bg-white p-4 shadow-sm">
            <div class="mb-4 flex items-center justify-between gap-3">
              <div>
                <div class="text-sm font-semibold text-slate-900">Handlungsbedarf</div>
                <div class="text-xs text-slate-500">Kritische Kacheln mit direkter Drilldown-Funktion.</div>
              </div>
              <div class="rounded-full bg-red-50 px-3 py-1 text-xs font-semibold text-red-700">Priorisieren</div>
            </div>
            <div class="grid grid-cols-1 gap-3">
              ${listActionCard('Offene hohe Priorität', s.offeneHohePrioritaet, 'Bitte sofort prüfen', 'red', 'data-priority-status-filter="Hoch" data-priority-status="Offen"')}
              ${listActionCard('Offene Reklamationen', s.offeneReklamationen, 'Reklamationen mit offenem Status', 'orange', 'data-besuchsart-filter="Reklamation"')}
              ${listActionCard('Ohne nächste Maßnahme', s.ohneMassnahme, 'Berichte ohne Folgeaktion', 'slate', 'data-missing-filter="massnahme"')}
              ${listActionCard('Ohne Ergebnis', s.ohneErgebnis, 'Berichte ohne dokumentiertes Ergebnis', 'slate', 'data-missing-filter="ergebnis"')}
              ${listActionCard('Überfällige offene Fälle', s.ueberfaellig, 'Seit mindestens 14 Tagen offen', 'amber', 'data-overdue-filter="true"')}

          </div>

          <div class="rounded-2xl bg-white p-4 shadow-sm">
            <div class="mb-4 flex items-center justify-between gap-3">
              <div>
                <div class="text-sm font-semibold">Statusverteilung</div>

              <div class="rounded-full bg-zinc-100 px-3 py-1 text-xs font-semibold text-slate-700">Aktiv ${s.aktivQuote}%</div>
            </div>
            <div class="space-y-3">
              ${statusBarRow('Offen', s.offen, totalKnown, 'amber', 'data-stat-filter="Offen"')}

                <button type="button" data-taetigkeitsfeld-filter="${escapeAttr(item.name)}" class="flex w-full items-center justify-between rounded-xl bg-zinc-100 px-3 py-3 text-sm transition hover:-translate-y-0.5 hover:shadow-md">
                  <span>${escapeHtml(item.name)}</span>
                  <span class="rounded-full bg-emerald-700 px-2 py-1 text-xs font-semibold text-white">${item.count}</span>

            </div>

        return `<div class="space-y-2.5">${maschinen.map((machine, index) => `
          <div class="rounded-xl border border-zinc-200 bg-white p-3">
            <div class="mb-2 text-sm font-semibold text-slate-900">Maschine ${index + 1}</div>
            <div class="space-y-2">
              ${compactRow('Maschine', escapeHtml(machine.maschine || '-'))}
              ${compactRow('Hersteller', escapeHtml(machine.maschinenhersteller || '-'))}
              ${compactRow('Aufnahme', escapeHtml(machine.aufnahme || '-'))}
              ${compactRow('Verfahren', formatValue(machine.verfahren))}
              ${compactRow('Werkstoffe', formatValue(machine.werkstoff))}
              ${compactRow('Kühlmedium', formatValue(machine.kuehlmedium))}
              ${compactRow('BAR / Druck', escapeHtml(machine.barDruck || '-'))}
              ${compactRow('Bemerkung', escapeHtml(machine.bemerkung || '-'))}

          </div>
        `).join('')}</div>`;
      };

      return `
        <div class="space-y-3">
          <div class="overflow-hidden rounded-2xl border border-zinc-200 bg-white shadow-sm">
            <div class="h-1 bg-red-700"></div>
            <div class="p-3.5">
              <div class="flex items-start justify-between gap-3">
                <div class="min-w-0 flex-1">
                  <div class="text-[10px] font-semibold uppercase tracking-[0.16em] text-red-700">Besuchsbericht</div>
                  <h2 class="mt-1 text-lg font-bold leading-tight text-slate-900 break-words">${escapeHtml(v.kundenname || 'Besuchsdetail')}</h2>
                  <div class="mt-2 flex flex-wrap gap-2">
                    <span class="rounded-full px-2.5 py-1 text-[11px] font-bold ${priorityStyles[v.prioritaet] || 'bg-slate-100 text-slate-700'}">Priorität: ${escapeHtml(v.prioritaet || '-')}</span>
                    <span class="rounded-full px-2.5 py-1 text-[11px] font-bold ${statusStyles[v.status] || 'bg-slate-100 text-slate-700'}">Status: ${escapeHtml(v.status || '-')}</span>
                    <span class="rounded-full bg-zinc-100 px-2.5 py-1 text-[11px] font-semibold text-slate-700">${escapeHtml(berichtstypLabel)}</span>
                  </div>
                </div>
                <div class="rounded-lg bg-zinc-50 px-2.5 py-2 text-right shrink-0">
                  <div class="text-[10px] font-semibold uppercase tracking-[0.12em] text-slate-400">Datum</div>
                  <div class="mt-1 text-sm font-semibold leading-4 text-slate-700">${escapeHtml(v.besuchsdatum || '-')}</div>
                </div>
              </div>

              <div class="mt-3 space-y-2">
                ${compactRow('Kundennr.', escapeHtml(v.kundennummer || '-'))}
                ${compactRow('Techniker', escapeHtml(v.techniker || '-'))}
              </div>
            </div>
          </div>

          <div class="rounded-2xl border border-zinc-200 bg-white p-3.5 shadow-sm">
            <div class="mb-2 text-sm font-semibold text-slate-900">Basisdaten</div>
            <div class="space-y-2">
              ${compactRow('Besuchsart', escapeHtml(v.besuchsart || (v.berichtstyp === 'erstanamnese' ? 'Erstanamnese' : '-')))}
              ${compactRow('Kundenname', escapeHtml(v.kundenname || '-'))}
              ${compactRow('Kontakt', escapeHtml(v.ansprechperson || '-'))}
              ${compactRow('ADM', escapeHtml(v.adm || '-'))}
              ${compactRow('Angebot', escapeHtml(v.angebotsnummer || '-'))}
            </div>
          </div>

          ${v.berichtstyp === 'erstanamnese' ? `
            <div class="rounded-2xl border border-zinc-200 bg-white p-3.5 shadow-sm">
              <div class="mb-2 text-sm font-semibold text-slate-900">Maschinen beim Kunden</div>
              ${renderMachineBlocks()}
            </div>
          ` : `
            <div class="rounded-2xl border border-zinc-200 bg-white p-3.5 shadow-sm">
              <div class="mb-2 text-sm font-semibold text-slate-900">Maschine / Einsatz</div>
              <div class="space-y-2">
                ${compactRow('Maschine', escapeHtml(v.maschine || '-'))}
                ${compactRow('Hersteller', escapeHtml(v.maschinenhersteller || '-'))}
                ${compactRow('Aufnahme', escapeHtml(v.aufnahme || '-'))}
                ${compactRow('Verfahren', formatValue(v.verfahren))}
                ${compactRow('Werkstoff', formatValue(v.werkstoff))}
                ${compactRow('Material', escapeHtml(v.materialbezeichnung || '-'))}
                ${compactRow('Kühlmittel', formatValue(v.kuehlmedium))}
                ${compactRow('BAR / Druck', escapeHtml(v.barDruck || '-'))}
                ${compactRow('Bearbeitungsziel', formatValue(v.bearbeitungsziel))}
              </div>
            </div>
          `}

          <div class="rounded-2xl border border-zinc-200 bg-white p-3.5 shadow-sm">
            <div class="mb-2 text-sm font-semibold text-slate-900">Technische Dokumentation</div>
            <div class="space-y-2">
              ${compactRow('Problem', escapeHtml(v.problemstellung || '-'))}
              ${compactRow('Lösung', escapeHtml(v.empfehlung || '-'))}
              ${compactRow('Bericht', escapeHtml(v.besuchsbericht || '-'))}
              ${compactRow('Ergebnis', escapeHtml(v.ergebnis || '-'))}
              ${compactRow('Nächste Maßnahme', formatValue(v.naechsteMassnahme))}
              ${compactRow('Verantwortlich', escapeHtml(v.verantwortlich || '-'))}
            </div>
          </div>

          <div class="rounded-2xl border border-zinc-200 bg-white p-3.5 shadow-sm">
            <div class="mb-2 text-sm font-semibold text-slate-900">Dateien / Bilder</div>
            ${renderFileList(v.id)}
          </div>

          <div class="rounded-2xl border border-zinc-200 bg-white p-3.5 shadow-sm space-y-3">
            <button id="editVisitBtn" class="w-full rounded-2xl bg-red-700 px-4 py-3.5 font-semibold text-white shadow-lg">Bericht bearbeiten</button>
            <button id="deleteVisitBtn" class="w-full rounded-2xl bg-red-600 px-4 py-3.5 font-semibold text-white shadow-lg">Besuch löschen</button>
          </div>
        </div>
      `;
    }

    function render() {
      updateNav();
      if (!state.sessionReady) {
        app.innerHTML = '<div class="rounded-2xl bg-white p-6 text-sm text-slate-500 shadow-sm">Verbindung wird vorbereitet...</div>';
        bindEvents();
        return;
      }
      if (!state.currentUser) {
        app.innerHTML = '<div class="rounded-2xl bg-white p-6 text-sm text-slate-500 shadow-sm">Bitte anmelden, um fortzufahren.</div>';
        bindEvents();
        return;
      }
      if (state.screen === 'start') app.innerHTML = renderStart();
      if (state.screen === 'besuche') app.innerHTML = renderBesuche();
      if (state.screen === 'neu') app.innerHTML = renderNeu();
      if (state.screen === 'dashboard') app.innerHTML = renderDashboard();
      if (state.screen === 'detail') app.innerHTML = renderDetail();
      if (state.screen === 'einstellungen') app.innerHTML = renderSettings();
      bindEvents();
    }

    function bindEvents() {
      document.getElementById('newVisitBtn')?.addEventListener('click', () => {
        state.editingVisitId = null;
        state.selectedVisit = null;
        state.pendingFiles = [];
        state.form = emptyVisit();
        state.formErrors = {};
        setScreen('neu');
      });
      document.getElementById('settingsStartBtn')?.addEventListener('click', () => setScreen('einstellungen'));

      document.querySelectorAll('[data-berichtstyp]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.form.berichtstyp = btn.dataset.berichtstyp;
          state.formErrors = {};
          render();
        });
      });

      document.getElementById('addMachineBtn')?.addEventListener('click', () => {
        state.form.erstanamneseMaschinen = [
          ...(state.form.erstanamneseMaschinen || []),
          {
            maschine: '',
            maschinenhersteller: '',
            aufnahme: '',
            verfahren: [],
            werkstoff: [],
            kuehlmedium: [],
            barDruck: '',
            bemerkung: ''
          }
        ];
        render();
      });

      document.querySelectorAll('[data-machine-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          const index = Number(btn.dataset.machineRemove);
          state.form.erstanamneseMaschinen = (state.form.erstanamneseMaschinen || []).filter((_, i) => i !== index);
          render();
        });
      });

      document.querySelectorAll('[data-machine-input]').forEach(input => {
        input.addEventListener('input', (e) => {
          const index = Number(e.target.dataset.machineIndex);
          const field = e.target.dataset.machineInput;
          if (!state.form.erstanamneseMaschinen[index]) return;
          state.form.erstanamneseMaschinen[index][field] = e.target.value;
        });
      });

      document.querySelectorAll('[data-machine-select]').forEach(selectEl => {
        selectEl.addEventListener('change', (e) => {
          const index = Number(e.target.dataset.machineIndex);
          const field = e.target.dataset.machineSelect;
          if (!state.form.erstanamneseMaschinen[index]) return;
          state.form.erstanamneseMaschinen[index][field] = e.target.value;
        });
      });

      document.querySelectorAll('[data-machine-multiselect]').forEach(btn => {
        btn.addEventListener('click', () => {
          const index = Number(btn.dataset.machineIndex);
          const field = btn.dataset.machineMultiselect;
          const value = btn.dataset.machineMultiselectValue;
          if (!state.form.erstanamneseMaschinen[index]) return;
          const current = Array.isArray(state.form.erstanamneseMaschinen[index][field]) ? [...state.form.erstanamneseMaschinen[index][field]] : [];
          const exists = current.includes(value);
          state.form.erstanamneseMaschinen[index][field] = exists ? current.filter(item => item !== value) : [...current, value];
          render();
        });
      });

      document.querySelectorAll('[data-stat-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
          setStatFilter(btn.dataset.statFilter);
        });
      });

      document.querySelectorAll('[data-techniker-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
          setTechnikerFilter(btn.dataset.technikerFilter);
        });
      });

      document.querySelectorAll('[data-besuchsart-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
          setBesuchsartFilter(btn.dataset.besuchsartFilter);
        });
      });

      document.querySelectorAll('[data-taetigkeitsfeld-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
          setTaetigkeitsfeldFilter(btn.dataset.taetigkeitsfeldFilter);
        });
      });

      document.querySelectorAll('[data-priority-status-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
          setPriorityStatusFilter(btn.dataset.priorityStatusFilter, btn.dataset.priorityStatus || 'Alle');
        });
      });

      document.querySelectorAll('[data-missing-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
          setMissingFieldFilter(btn.dataset.missingFilter);
        });
      });

      document.querySelectorAll('[data-overdue-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
          setOverdueFilter();
        });
      });

      document.querySelectorAll('.visit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedVisit = state.visits.find(v => String(v.id) === btn.dataset.visitId) || null;
          setScreen('detail');
        });
      });

      document.querySelectorAll('[data-copy-kundennummer]').forEach(btn => {
        btn.addEventListener('click', async (event) => {
          event.preventDefault();
          event.stopPropagation();
          const value = btn.dataset.copyKundennummer || '';
          if (!value) return;
          const original = btn.textContent;
          const originalTitle = btn.getAttribute('title') || '';
          const showButtonState = (label, titleText = '') => {
            btn.textContent = label;
            if (titleText) {
              btn.setAttribute('title', titleText);
            } else {
              btn.removeAttribute('title');
            }
          };
          const resetButton = () => {
            btn.textContent = original;
            if (originalTitle) {
              btn.setAttribute('title', originalTitle);
            } else {
              btn.removeAttribute('title');
            }
          };
          try {
            let copied = false;
            if (window.isSecureContext && navigator.clipboard?.writeText) {
              await navigator.clipboard.writeText(value);
              copied = true;
            }
            if (!copied) {
              const helper = document.createElement('textarea');
              helper.value = value;
              helper.setAttribute('readonly', '');
              helper.style.position = 'fixed';
              helper.style.top = '-9999px';
              helper.style.left = '-9999px';
              helper.style.opacity = '0';
              document.body.appendChild(helper);
              helper.focus();
              helper.select();
              helper.setSelectionRange(0, helper.value.length);
              const success = document.execCommand('copy');
              document.body.removeChild(helper);
              if (success) {
                copied = true;
              }
            }
            if (copied) {
              showButtonState('Kopiert');
              setTimeout(resetButton, 1200);
            } else {
              showButtonState('Manuell');
              setTimeout(resetButton, 1400);
            }
          } catch (error) {
            console.error(error);
            showButtonState('Manuell');
            setTimeout(resetButton, 1400);
          }
        });
      });

      document.getElementById('searchInput')?.addEventListener('input', (e) => {
        state.search = e.target.value;
        render();
      });

      document.getElementById('clearTechnikerFilterBtn')?.addEventListener('click', () => {
        clearTechnikerFilter();
      });

      document.getElementById('clearBesuchsartFilterBtn')?.addEventListener('click', () => {
        clearBesuchsartFilter();
      });

      document.getElementById('clearTaetigkeitsfeldFilterBtn')?.addEventListener('click', () => {
        clearTaetigkeitsfeldFilter();
      });

      document.getElementById('statusFilter')?.addEventListener('change', (e) => {
        state.filterStatus = e.target.value;
        render();
      });

      document.getElementById('taetigkeitsfeldFilter')?.addEventListener('change', (e) => {
        state.taetigkeitsfeldFilter = e.target.value === 'Alle' ? '' : e.target.value;
        render();
      });

      document.getElementById('exportExcelBtn')?.addEventListener('click', () => {
        downloadExcelExport();
      });

      document.getElementById('visitForm')?.addEventListener('input', (e) => {
        const target = e.target;
        if (!target.name) return;
        if (target.name === 'taetigkeitsfeld') {
          state.form[target.name] = target.value ? [target.value] : [];
        } else {
          state.form[target.name] = target.value;
        }
        if (state.formErrors[target.name]) delete state.formErrors[target.name];
        if (target.name === 'techniker' || target.name === 'besuchsart' || target.dataset.renderOnChange === 'true' || target.name === 'taetigkeitsfeld') render();
      });

      document.getElementById('visitForm')?.addEventListener('change', (e) => {
        const target = e.target;
        if (!target.name) return;
        if (target.name === 'taetigkeitsfeld') {
          state.form[target.name] = target.value ? [target.value] : [];
        } else {
          state.form[target.name] = target.value;
        }
        if (state.formErrors[target.name]) delete state.formErrors[target.name];
        if (target.name === 'techniker' || target.name === 'besuchsart' || target.dataset.renderOnChange === 'true' || target.name === 'taetigkeitsfeld' || target.tagName === 'SELECT' || target.type === 'date') render();
      });

      document.querySelectorAll('[data-multiselect-field]').forEach(btn => {
        btn.addEventListener('click', () => {
          const field = btn.dataset.multiselectField;
          const value = btn.dataset.multiselectValue;
          const current = Array.isArray(state.form[field]) ? [...state.form[field]] : [];
          const exists = current.includes(value);
          state.form[field] = exists ? current.filter(item => item !== value) : [...current, value];
          if (state.formErrors[field]) delete state.formErrors[field];
          render();
        });
      });

      document.getElementById('fileUploadInput')?.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files || []);
        if (!files.length || !state.editingVisitId) return;
        await uploadFiles(state.editingVisitId, files);
        e.target.value = '';
      });

      document.querySelectorAll('[data-file-open]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const visitId = btn.dataset.fileVisitId;
          const fileId = btn.dataset.fileOpen;
          await openFile(visitId, fileId);
        });
      });

      document.querySelectorAll('[data-file-delete]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const visitId = btn.dataset.fileVisitId;
          const fileId = btn.dataset.fileDelete;
          await deleteFile(visitId, fileId);
        });
      });

      document.getElementById('visitForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const missing = validateForm();
        if (missing.length) {
          state.formErrors = Object.fromEntries(missing.map(item => [item.key, item.label]));
          render();
          return;
        }
        state.formErrors = {};
        await saveVisit();
      });

      document.getElementById('cancelEditBtn')?.addEventListener('click', () => {
        state.form = emptyVisit();
        state.formErrors = {};
        state.pendingFiles = [];
        state.editingVisitId = null;
        if (state.selectedVisit) {
          setScreen('detail');
        } else {
          setScreen('besuche');
        }
      });

      document.getElementById('editVisitBtn')?.addEventListener('click', () => {
        if (!state.selectedVisit) return;
        state.editingVisitId = state.selectedVisit.id;
        state.form = {
          ...state.selectedVisit,
          verfahren: Array.isArray(state.selectedVisit.verfahren) ? [...state.selectedVisit.verfahren] : [],
          werkstoff: Array.isArray(state.selectedVisit.werkstoff) ? [...state.selectedVisit.werkstoff] : [],
          kuehlmedium: Array.isArray(state.selectedVisit.kuehlmedium) ? [...state.selectedVisit.kuehlmedium] : [],
          erstanamneseMaschinen: Array.isArray(state.selectedVisit.erstanamneseMaschinen) && state.selectedVisit.erstanamneseMaschinen.length
            ? state.selectedVisit.erstanamneseMaschinen.map(machine => ({
                maschine: machine.maschine || '',
                maschinenhersteller: machine.maschinenhersteller || '',
                aufnahme: machine.aufnahme || '',
                verfahren: Array.isArray(machine.verfahren) ? [...machine.verfahren] : [],
                werkstoff: Array.isArray(machine.werkstoff) ? [...machine.werkstoff] : [],
                kuehlmedium: Array.isArray(machine.kuehlmedium) ? [...machine.kuehlmedium] : [],
                barDruck: machine.barDruck || '',
                bemerkung: machine.bemerkung || ''
              }))
            : [{
                maschine: '',
                maschinenhersteller: '',
                aufnahme: '',
                verfahren: [],
                werkstoff: [],
                kuehlmedium: [],
                barDruck: '',
                bemerkung: ''
              }]
        };
        state.formErrors = {};
        setScreen('neu');
      });

      document.getElementById('deleteVisitBtn')?.addEventListener('click', async () => {
        if (!state.selectedVisit) return;
        const confirmed = confirm(`Moechtest du den Besuch bei ${state.selectedVisit.kundenname || 'diesem Kunden'} wirklich loeschen?`);
        if (!confirmed) return;
        await deleteVisit(state.selectedVisit.id);
      });

      document.querySelectorAll('[data-settings-input]').forEach(input => {
        input.addEventListener('input', () => {
          state.settingsDraft[input.dataset.settingsInput] = input.value;
        });
      });

      document.querySelectorAll('[data-settings-add]').forEach(btn => {

    function downloadExcelExport() {
      const rows = state.visits
        .slice()
        .sort((a, b) => String(b.besuchsdatum || '').localeCompare(String(a.besuchsdatum || '')))
        .map(v => ({
          'Besuchsdatum': v.besuchsdatum || '',
          'Techniker': v.techniker || '',
          'Kundennummer': v.kundennummer || '',
          'Kundenname': v.kundenname || '',
          'Ansprechperson': v.ansprechperson || '',
          'ADM': v.adm || '',
          'Angebotsnummer': v.angebotsnummer || '',
          'Berichtstyp': v.berichtstyp === 'erstanamnese' ? 'Erstanamnese' : 'Werkzeugversuch',
          'Besuchsart': v.besuchsart || '',
          'Maschine': v.maschine || '',
          'Maschinenhersteller': v.maschinenhersteller || '',
          'Aufnahme': v.aufnahme || '',
          'Verfahren': Array.isArray(v.verfahren) ? v.verfahren.join(', ') : '',
          'Werkstoff': Array.isArray(v.werkstoff) ? v.werkstoff.join(', ') : '',
          'Materialbezeichnung': v.materialbezeichnung || '',
          'Kuehlmedium': Array.isArray(v.kuehlmedium) ? v.kuehlmedium.join(', ') : '',
          'BAR / Druck': v.barDruck || '',
          'Bearbeitungsziel': Array.isArray(v.bearbeitungsziel) ? v.bearbeitungsziel.join(', ') : (v.bearbeitungsziel || ''),
          'Problemstellung': v.problemstellung || '',
          'Empfehlung / Loesung': v.empfehlung || '',
          'Besuchsbericht': v.besuchsbericht || '',
          'Ergebnis': v.ergebnis || '',
          'Naechste Massnahme': Array.isArray(v.naechsteMassnahme) ? v.naechsteMassnahme.join(', ') : (v.naechsteMassnahme || ''),
          'Verantwortlich': v.verantwortlich || '',
          'Status': v.status || '',
          'Prioritaet': v.prioritaet || '',
          'Anzahl Dateien': (state.visitFiles[v.id] || []).length,
          'Erstellt am': v.createdAt || '',
          'Aktualisiert am': v.updatedAt || ''
        }));

      if (!rows.length) {
        alert('Es sind keine Besuche fuer den Excel-Export vorhanden.');
        return;
      }

      const worksheet = window.XLSX.utils.json_to_sheet(rows);
      const workbook = window.XLSX.utils.book_new();
      window.XLSX.utils.book_append_sheet(workbook, worksheet, 'Besuche');
      worksheet['!autofilter'] = { ref: worksheet['!ref'] };
      worksheet['!freeze'] = { xSplit: 0, ySplit: 1 };
      const headers = Object.keys(rows[0]);
      worksheet['!cols'] = headers.map(header => {
        const maxLength = Math.max(
          header.length,
          ...rows.map(row => String(row[header] ?? '').length)
        );
        return { wch: Math.min(Math.max(maxLength + 2, 12), 40) };
      });

      const today = new Date().toISOString().slice(0, 10);
      window.XLSX.writeFile(workbook, `kundenbesuche-export-${today}.xlsx`);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function normalizeToArray(value) {
      if (Array.isArray(value)) {
        return value
          .flatMap(item => normalizeToArray(item))
          .filter(item => item !== '');
      }
      if (value == null) return [];
      if (typeof value === 'string') {
        const trimmed = value.trim();
        if (!trimmed) return [];
        if (trimmed.startsWith('[') && trimmed.endsWith(']')) {
          try {
            return normalizeToArray(JSON.parse(trimmed));
          } catch (error) {}
        }
        return [trimmed];
      }
      return [String(value)];
    }

    async function __loadMasterData_original() {
      if (!supabaseClient) return;
      const { data, error } = await supabaseClient
        .from('master_data')
        .select('category, value, sort_order, is_active')
        .eq('is_active', true)
        .order('sort_order', { ascending: true })
        .order('value', { ascending: true });

      if (error) {
        console.error(error);
        state.masterData = structuredClone(defaultMasterData);
        resetSettingsDraft();
        setStatus('Stammdatenfehler', 'red');
        return;
      }

      if (!data || !data.length) {
        state.masterData = structuredClone(defaultMasterData);
        resetSettingsDraft();
        return;
      }

      const grouped = structuredClone(defaultMasterData);
      Object.keys(grouped).forEach(key => grouped[key] = []);

      data.forEach(item => {
        if (!item?.value) return;
        const normalizedCategory = normalizeMasterCategory(item.category);
        if (!grouped[normalizedCategory]) return;
        grouped[normalizedCategory].push(item.value);
      });

      Object.keys(grouped).forEach(key => {
        grouped[key] = [...new Set(grouped[key])];
      });

      const hasKnownValues = stammgruppen.some(([key]) => (grouped[key] || []).length > 0);
      state.masterData = hasKnownValues ? grouped : structuredClone(defaultMasterData);
      resetSettingsDraft();
    }

    async function loadVisitFiles() {
      if (!supabaseClient) return;
      const { data, error } = await supabaseClient
        .from('visit_files')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error(error);
        return;
      }

      const grouped = {};
      (data || []).forEach(file => {
        if (!grouped[file.visit_id]) grouped[file.visit_id] = [];
        grouped[file.visit_id].push(file);
      });

    async function handleLogin(event) {
      if (event) event.preventDefault();
      hideLoginMessage();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      setStatus('Meldet an...', 'amber');
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        console.error(error);
        showLoginMessage(error.message || 'Anmeldung fehlgeschlagen.');
        setStatus('Anmeldung fehlgeschlagen', 'red');
        return;
      }
      state.currentUser = data.user || data.session?.user || null;
      await afterLogin();
    }

    async function afterLogin() {
      state.sessionReady = true;
      updateLoginState();
      await ensureUserProfile();
      await loadMasterData();
      await loadVisitFiles();
      await loadVisits();
      setStatus('Verbunden', 'green');
      render();
    }

    async function loadMasterData() {
      if (!supabaseClient) return;
      const { data, error } = await supabaseClient
        .from('master_data')
        .select('category, value, sort_order, is_active')
        .eq('is_active', true)
        .order('sort_order', { ascending: true })
        .order('value', { ascending: true });

      if (error) {
        console.error(error);
        state.masterData = structuredClone(defaultMasterData);
        resetSettingsDraft();
        setStatus('Stammdatenfehler', 'red');
        return;
      }

      if (!data || !data.length) {
        state.masterData = structuredClone(defaultMasterData);
        resetSettingsDraft();
        return;
      }

      const grouped = structuredClone(defaultMasterData);
      Object.keys(grouped).forEach(key => grouped[key] = []);

      data.forEach(item => {
        if (!item?.value) return;
        const normalizedCategory = normalizeMasterCategory(item.category);
        if (!grouped[normalizedCategory]) return;
        grouped[normalizedCategory].push(item.value);
      });

      Object.keys(grouped).forEach(key => {
        grouped[key] = [...new Set(grouped[key])];
      });

      const hasKnownValues = stammgruppen.some(([key]) => (grouped[key] || []).length > 0);
      state.masterData = hasKnownValues ? grouped : structuredClone(defaultMasterData);
      resetSettingsDraft();
    }

    async function loadVisits() {
      if (!supabaseClient) return;
      state.loading = true;
      const { data, error } = await supabaseClient
        .from('visits')
        .select('*')
        .order('visit_date', { ascending: false })
        .order('created_at', { ascending: false });

      state.loading = false;

      if (error) {
        console.error(error);
        setStatus('Ladefehler', 'red');
        return;
      }

      state.visits = (data || []).map(mapVisitFromDb);
      await loadVisitMachines();
      state.visits.forEach(visit => {
        visit.dateien = state.visitFiles[visit.id] || [];
        visit.bildVorhanden = visit.dateien.some(file => file.file_category === 'image');
      });
    }

    async function saveVisitMachines(visitId, maschinen) {
      if (!supabaseClient || !visitId) return;

      const list = Array.isArray(maschinen) ? maschinen : [];
      const { error: deleteError } = await supabaseClient
        .from('visit_machines')
        .delete()
        .eq('visit_id', visitId);

      if (deleteError) {
        console.error(deleteError);
        throw deleteError;
      }

      const cleaned = list
        .map((machine, index) => ({
          visit_id: visitId,
          sort_order: index,
          machine_name: machine.maschine || null,
          machine_manufacturer: machine.maschinenhersteller || null,
          holder_type: machine.aufnahme || null,
          process_types: Array.isArray(machine.verfahren) ? machine.verfahren : [],
          material_types: Array.isArray(machine.werkstoff) ? machine.werkstoff : [],
          coolant_types: Array.isArray(machine.kuehlmedium) ? machine.kuehlmedium : [],
          pressure_text: machine.barDruck || null,
          note: machine.bemerkung || null
        }))
        .filter(machine => machine.machine_name || machine.machine_manufacturer || machine.holder_type || machine.process_types.length || machine.material_types.length || machine.coolant_types.length || machine.pressure_text || machine.note);

      if (!cleaned.length) return;

      const { error: insertError } = await supabaseClient
        .from('visit_machines')
        .insert(cleaned);

      if (insertError) {
        console.error(insertError);
        throw insertError;
      }
    }

    async function loadVisitMachines() {
      if (!supabaseClient) return;
      const { data, error } = await supabaseClient
        .from('visit_machines')
        .select('*')
        .order('visit_id', { ascending: true })
        .order('sort_order', { ascending: true })
        .order('id', { ascending: true });

      if (error) {
        console.error(error);
        return;
      }

      const grouped = {};
      (data || []).forEach(machine => {
        if (!grouped[machine.visit_id]) grouped[machine.visit_id] = [];
        grouped[machine.visit_id].push({
          id: machine.id,
          maschine: machine.machine_name || '',
          maschinenhersteller: machine.machine_manufacturer || '',
          aufnahme: machine.holder_type || '',
          verfahren: Array.isArray(machine.process_types) ? machine.process_types : [],
          werkstoff: Array.isArray(machine.material_types) ? machine.material_types : [],
          kuehlmedium: Array.isArray(machine.coolant_types) ? machine.coolant_types : [],
          barDruck: machine.pressure_text || '',
          bemerkung: machine.note || ''
        });
      });

      Object.keys(grouped).forEach(visitId => {

        if (visit) {

    async function saveVisit() {
      if (!supabaseClient || !state.currentUser) return;
      state.busy = true;
      setStatus('Speichert...', 'amber');

      const payload = mapVisitToDb(state.form);

      let result;
      if (state.editingVisitId) {
        result = await supabaseClient
          .from('visits')
          .update(payload)
          .eq('id', state.editingVisitId)
          .select()
          .single();
      } else {
        result = await supabaseClient
          .from('visits')
          .insert({ ...payload, created_by: state.currentUser.id })
          .select()
          .single();
      }

      if (result.error) {
        state.busy = false;
        console.error('SAVE_VISIT_ERROR', result.error);
        const detail = result.error.message || result.error.details || result.error.hint || 'Unbekannter Fehler';
        alert(`Speichern fehlgeschlagen:\n${detail}`);
        setStatus('Speicherfehler', 'red');
        return;
      }

      try {
        if ((state.form.berichtstyp || 'werkzeugversuch') === 'erstanamnese') {
          await saveVisitMachines(result.data.id, state.form.erstanamneseMaschinen || []);
        } else {
          await saveVisitMachines(result.data.id, []);
        }
      } catch (machineError) {
        state.busy = false;
        const detail = machineError.message || machineError.details || machineError.hint || 'Maschinendaten konnten nicht gespeichert werden';
        alert(`Besuch gespeichert, aber Maschinen nicht:\n${detail}`);
        setStatus('Teilweise gespeichert', 'red');
        return;
      }

      await loadVisits();
      const mapped = state.visits.find(v => v.id === result.data.id) || mapVisitFromDb(result.data);
      state.busy = false;
      if (state.editingVisitId) {
        state.visits = state.visits.map(v => v.id === state.editingVisitId ? mapped : v);
        state.selectedVisit = mapped;
        state.editingVisitId = null;
        state.form = emptyVisit();
        setScreen('detail');
      } else {
        state.form = emptyVisit();
        setScreen('besuche');
      }
      setStatus('Gespeichert', 'green');
    }

    async function uploadFiles(visitId, files) {
      if (!supabaseClient || !state.currentUser || !visitId || !files?.length) return;

      const allowed = ['image/jpeg', 'image/png', 'image/webp', 'application/pdf'];
      for (const file of files) {
        if (!allowed.includes(file.type)) {
          alert(`Dateityp nicht erlaubt: ${file.name}`);
          continue;
        }
        if (file.size > 10 * 1024 * 1024) {
          alert(`Datei zu gross (max. 10 MB): ${file.name}`);
          continue;
        }

        const extension = (file.name.split('.').pop() || '').toLowerCase();
        const uniqueName = `${Date.now()}-${Math.random().toString(36).slice(2)}.${extension}`;
        const storagePath = `${visitId}/${uniqueName}`;
        const category = file.type === 'application/pdf' ? 'pdf' : 'image';

        setStatus('Datei wird hochgeladen...', 'amber');
        const uploadResult = await supabaseClient.storage
          .from('visit-files')
          .upload(storagePath, file, { upsert: false });

        if (uploadResult.error) {
          console.error(uploadResult.error);
          const detail = uploadResult.error.message ? `\n${uploadResult.error.message}` : '';
          alert(`Upload fehlgeschlagen: ${file.name}${detail}`);
          continue;
        }

        const insertResult = await supabaseClient.from('visit_files').insert({
          visit_id: visitId,
          file_name: file.name,
          file_path: storagePath,
          file_type: file.type,
          file_category: category
        });

        if (insertResult.error) {
          console.error(insertResult.error);
          alert(`Datei-Metadaten konnten nicht gespeichert werden: ${file.name}`);
          await supabaseClient.storage.from('visit-files').remove([storagePath]);
          continue;
        }
      }

      await loadVisitFiles();
      await loadVisits();
      if (state.selectedVisit?.id === visitId) {
        state.selectedVisit = state.visits.find(v => v.id === visitId) || state.selectedVisit;
      }
      setStatus('Datei gespeichert', 'green');
      render();
    }

    async function openFile(visitId, fileId) {
      const file = (state.visitFiles[visitId] || []).find(item => String(item.id) === String(fileId));
      if (!file || !supabaseClient) return;
      const { data, error } = await supabaseClient.storage.from('visit-files').createSignedUrl(file.file_path, 60);
      if (error || !data?.signedUrl) {
        console.error(error);
        alert('Datei konnte nicht geöffnet werden.');
        return;
      }
      window.open(data.signedUrl, '_blank');
    }

    async function deleteFile(visitId, fileId) {
      if (!supabaseClient) return;
      const file = (state.visitFiles[visitId] || []).find(item => String(item.id) === String(fileId));
      if (!file) return;
      const confirmed = confirm(`Datei ${file.file_name} wirklich loeschen?`);
      if (!confirmed) return;

      const dbDelete = await supabaseClient.from('visit_files').delete().eq('id', file.id);
      if (dbDelete.error) {
        console.error(dbDelete.error);
        alert('Datei konnte nicht geloescht werden.');
        return;
      }

      const storageDelete = await supabaseClient.storage.from('visit-files').remove([file.file_path]);
      if (storageDelete.error) {
        console.error(storageDelete.error);
      }

      await loadVisitFiles();
      await loadVisits();
      if (state.selectedVisit?.id === visitId) {
        state.selectedVisit = state.visits.find(v => v.id === visitId) || state.selectedVisit;
      }
      setStatus('Datei geloescht', 'green');
      render();
    }

    async function deleteVisit(id) {
      if (!supabaseClient || !id) return;
      const { error } = await supabaseClient.from('visits').delete().eq('id', id);
      if (error) {
        console.error(error);
        alert('Loeschen fehlgeschlagen.');
        setStatus('Loeschfehler', 'red');
        return;
      }
      state.visits = state.visits.filter(v => v.id !== id);
      state.selectedVisit = null;
      state.editingVisitId = null;
      state.form = emptyVisit();
      setScreen('besuche');
      setStatus('Geloescht', 'green');
    }

    async function addMasterDataValue(category, value) {
      if (!supabaseClient || !state.currentUser) return;
      const nextSort = (state.masterData[category] || []).length + 1;
      const { error } = await supabaseClient.from('master_data').insert({
        category,
        value,
        sort_order: nextSort,
        created_by: state.currentUser.id,
        updated_by: state.currentUser.id
      });
      if (error) {
        console.error(error);
        alert('Stammdaten konnten nicht gespeichert werden.');
        return;
      }
      await loadMasterData();
      render();
    }

    async function removeMasterDataValue(category, value) {
      if (!supabaseClient) return;
      const { error } = await supabaseClient
        .from('master_data')
        .update({ is_active: false, updated_by: state.currentUser?.id || null })
        .eq('category', category)
        .eq('value', value);
      if (error) {
        console.error(error);
        alert('Stammdaten konnten nicht entfernt werden.');
        return;
      }
      await loadMasterData();
      render();
    }

    loginForm.addEventListener('submit', handleLogin);
    logoutBtn.addEventListener('click', async () => {
      if (!supabaseClient) return;
      await supabaseClient.auth.signOut();
      state.currentUser = null;
      state.visits = [];
      state.visitFiles = {};
      state.selectedVisit = null;
      state.form = emptyVisit();
      updateLoginState();
      render();
    });

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => setScreen(btn.dataset.screen));
    });
    async function initSession() {
      if (!supabaseClient) {
        state.sessionReady = true;
        setStatus('Keine Verbindung', 'red');
        render();
        return;
      }

      const { data, error } = await supabaseClient.auth.getSession();
      if (error) {
        console.error(error);
        state.sessionReady = true;
        setStatus('Sitzungsfehler', 'red');
        render();
        return;
      }

      state.currentUser = data.session?.user || null;
      state.sessionReady = true;
      updateLoginState();

      if (state.currentUser) {
        await afterLogin();
      } else {
        render();
      }
    }

    initSession();
  </script>
